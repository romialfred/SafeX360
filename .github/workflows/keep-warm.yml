name: SafeX availability probe

# Cette sonde détecte une indisponibilité ; elle ne constitue ni un mécanisme
# de haute disponibilité ni un substitut à un hébergement assorti d'un SLA.

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Vérifier les services critiques
        shell: bash
        run: |
          set -u
          services=(
            "gateway|https://safex360-gateway.onrender.com/actuator/health|actuator"
            "health-safety|https://safex360-hns.onrender.com/actuator/health|actuator"
            "minexpert|https://safex360-minexpert.onrender.com/actuator/health|actuator"
            "eureka|https://safex360-eureka.onrender.com/|http"
          )
          failures=0
          for service in "${services[@]}"; do
            IFS='|' read -r name url mode <<< "$service"
            body_file="$(mktemp)"
            result=$(curl --silent --show-error --location \
              --retry 2 --retry-delay 2 --retry-all-errors \
              --connect-timeout 10 --max-time 90 \
              --output "$body_file" --write-out "%{http_code}|%{time_total}" \
              "$url")
            curl_exit=$?
            IFS='|' read -r code elapsed <<< "${result:-000|20}"
            healthy=true
            if [ "$curl_exit" -ne 0 ] || [[ ! "$code" =~ ^2 ]]; then
              healthy=false
            elif [ "$mode" = "actuator" ] && ! grep -Eq '"status"[[:space:]]*:[[:space:]]*"UP"' "$body_file"; then
              healthy=false
            elif awk "BEGIN { exit !($elapsed > 10) }"; then
              # Cold start Render free tier : 50-60 s est NORMAL au reveil. Le but
              # premier du job est precisement de reveiller les dynos — punir la
              # lenteur ferait echouer le job a chaque reveil nocturne.
              echo "::warning::$name lent (${elapsed}s) — probable cold start, non bloquant"
            fi
            rm -f "$body_file"
            if [ "$healthy" = true ]; then
              echo "OK $name HTTP=$code durée=${elapsed}s"
            else
              echo "ERREUR $name HTTP=${code:-000} durée=${elapsed:-inconnue}s"
              failures=$((failures+1))
            fi
          done
          if [ "$failures" -gt 0 ]; then
            echo "::error::$failures service(s) critique(s) indisponible(s) ou trop lent(s)."
            exit 1
          fi
