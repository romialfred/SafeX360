name: SafeX 360 Field — Build APK Android

on:
    push:
        branches: [main]
        paths:
            - 'Frontend/**'
            - '.github/workflows/android-build.yml'
    workflow_dispatch:
        inputs:
            build_type:
                description: 'Type de build (debug | release)'
                required: true
                default: 'debug'
                type: choice
                options:
                    - debug
                    - release

permissions:
    contents: write   # necessaire pour pousser l'APK dans Mobile/ apres build release

jobs:
    build-apk:
        name: Build APK ${{ github.event.inputs.build_type || 'debug' }}
        runs-on: ubuntu-latest
        timeout-minutes: 30

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 1

            - name: Setup Node.js 20
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'
                  cache-dependency-path: Frontend/package-lock.json

            - name: Setup JDK 17
              uses: actions/setup-java@v4
              with:
                  distribution: 'temurin'
                  java-version: '17'

            - name: Setup Android SDK
              uses: android-actions/setup-android@v3
              with:
                  api-level: 34
                  build-tools-version: '34.0.0'
                  ndk-version: '26.1.10909125'

            - name: Cache Gradle
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.gradle/caches
                      ~/.gradle/wrapper
                  key: ${{ runner.os }}-gradle-${{ hashFiles('Frontend/android/**/*.gradle*', 'Frontend/android/**/gradle-wrapper.properties') }}
                  restore-keys: |
                      ${{ runner.os }}-gradle-

            - name: Install npm dependencies
              working-directory: Frontend
              run: npm ci

            - name: TypeScript check
              working-directory: Frontend
              run: npx tsc --noEmit -p tsconfig.json

            - name: Build web bundle (Vite production, mobile env)
              working-directory: Frontend
              # IMPORTANT : pour le build APK on utilise .env.mobile qui pointe
              # vers la prod (https://safex360-gateway.onrender.com) au lieu de
              # localhost:9000 dans le .env de dev. Sans ca, l'APK installe sur
              # un device ne pourrait pas joindre le backend (BD Aiven).
              run: |
                  if [ -f .env.mobile ]; then
                    cp .env.mobile .env.production.local
                    echo "Build avec config mobile :"
                    grep VITE_API_URL .env.production.local || true
                  fi
                  npm run build

            - name: Check Capacitor Android project exists
              id: android-check
              working-directory: Frontend
              run: |
                  if [ -d "android" ]; then
                    echo "exists=true" >> $GITHUB_OUTPUT
                  else
                    echo "exists=false" >> $GITHUB_OUTPUT
                  fi

            - name: Capacitor add android (first time only)
              if: steps.android-check.outputs.exists == 'false'
              working-directory: Frontend
              run: npx cap add android

            - name: Capacitor sync android
              working-directory: Frontend
              run: npx cap sync android

            - name: Make gradlew executable
              working-directory: Frontend/android
              run: chmod +x gradlew

            - name: Build APK (debug)
              if: ${{ github.event.inputs.build_type != 'release' }}
              working-directory: Frontend/android
              run: ./gradlew assembleDebug --stacktrace

            - name: Build APK (release)
              if: ${{ github.event.inputs.build_type == 'release' }}
              working-directory: Frontend/android
              env:
                  KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
                  KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
                  KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
                  KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
              run: |
                  # Reconstituer le keystore depuis le secret base64
                  echo "$KEYSTORE_BASE64" | base64 -d > app/safex360.keystore
                  # Generer key.properties (aligne sur MOBILE_DEPLOY.md)
                  cat > key.properties <<EOF
                  storeFile=safex360.keystore
                  storePassword=$KEYSTORE_PASSWORD
                  keyAlias=$KEY_ALIAS
                  keyPassword=$KEY_PASSWORD
                  EOF
                  # Build APK signe
                  ./gradlew assembleRelease --stacktrace
                  # Verification signature
                  echo "::group::Verification signature APK"
                  $ANDROID_HOME/build-tools/34.0.0/apksigner verify --verbose \
                      app/build/outputs/apk/release/app-release.apk || \
                      echo "::warning::apksigner verify a echoue — verifier la cle"
                  echo "::endgroup::"

            - name: Upload APK artifact
              uses: actions/upload-artifact@v4
              with:
                  name: safex360-field-${{ github.event.inputs.build_type || 'debug' }}-${{ github.sha }}
                  path: Frontend/android/app/build/outputs/apk/${{ github.event.inputs.build_type || 'debug' }}/*.apk
                  retention-days: 90

            - name: Copy APK to Mobile/ and Frontend/public/downloads/
              run: |
                  BUILD_TYPE="${{ github.event.inputs.build_type || 'debug' }}"
                  SRC_DIR="Frontend/android/app/build/outputs/apk/$BUILD_TYPE"
                  if [ -d "$SRC_DIR" ]; then
                    APK_FILE=$(ls $SRC_DIR/*.apk | head -1)
                    if [ -f "$APK_FILE" ]; then
                      mkdir -p Mobile Frontend/public/downloads
                      cp "$APK_FILE" Mobile/SafexMobile.apk
                      cp "$APK_FILE" Frontend/public/downloads/SafexMobile.apk
                      echo "✅ APK copie dans Mobile/SafexMobile.apk + Frontend/public/downloads/SafexMobile.apk"
                      ls -lh Mobile/SafexMobile.apk
                    fi
                  fi

            - name: Commit APK to repo (only on main + release)
              if: ${{ github.ref == 'refs/heads/main' && github.event.inputs.build_type == 'release' && github.event_name == 'workflow_dispatch' }}
              run: |
                  if [ -f Mobile/SafexMobile.apk ]; then
                    git config user.name "github-actions[bot]"
                    git config user.email "github-actions[bot]@users.noreply.github.com"
                    git add Mobile/SafexMobile.apk Frontend/public/downloads/SafexMobile.apk
                    git diff --cached --quiet || \
                      git commit -m "ci(mobile): publish APK v${{ github.run_number }} (commit ${{ github.sha }})"
                    git push || echo "::warning::Push echoue — peut-etre commit deja present"
                  fi

            - name: Print install command
              run: |
                  echo "::notice title=APK pret::Telecharger l'artifact safex360-field-* depuis Actions, puis sur appareil Android : adb install -r app-*.apk"
