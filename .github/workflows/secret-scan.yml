name: Secret scan

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  tracked-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Scan tracked files without disclosing values
        run: python scripts/security/scan_tracked_secrets.py --root .
