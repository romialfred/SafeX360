<!doctype html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0F766E" />

  <!-- Favicons (multi-formats pour compatibilite navigateurs + mobile) -->
  <link rel="icon" type="image/svg+xml" href="/safex-favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="/safex-logo.png" />
  <link rel="apple-touch-icon" href="/safex-logo.png" />
  <link rel="shortcut icon" href="/safex-favicon.svg" />

  <!-- Titre onglet + meta SEO -->
  <title>SafeX 360 : La plateforme Santé Sécurité des Mines Africaines</title>
  <meta name="description"
    content="SafeX 360 — La plateforme Santé Sécurité au Travail conçue pour l'industrie minière africaine. Incidents, audits, EPI, dynamitages, urgences. Conforme ISO 45001, 14001, 9001, 19011, 31000." />
  <meta name="application-name" content="SafeX 360" />
  <meta property="og:title" content="SafeX 360 : La plateforme Santé Sécurité des Mines Africaines" />
  <meta property="og:description"
    content="Préventeurs HSE, chaque équipe rentre chez elle entière. 21 modules métier conformes ISO 45001." />

  <meta property="og:type" content="website" />

  <!-- Polices -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">
</head>

<body>
  <div id="root">
    <!-- Loader statique : visible pendant le chargement initial / changement de mine, remplacé automatiquement par React -->
    <div style="position:fixed;inset:0;background:#FAF8F3;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999">
      <div style="width:44px;height:44px;border:3px solid #e2e8f0;border-top-color:#0F766E;border-radius:50%;animation:safex-load .7s linear infinite"></div>
      <p style="margin-top:14px;color:#475569;font-size:13px;font-family:system-ui,sans-serif">Chargement de SafeX 360&#8230;</p>
      <style>@keyframes safex-load{to{transform:rotate(360deg)}}</style>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
