function genMonthly() {
  const months = ['Juin 24','Juil 24','Août 24','Sept 24','Oct 24','Nov 24','Déc 24','Janv 25','Févr 25','Mars 25','Avr 25','Mai 25','Juin 25','Juil 25','Août 25','Sept 25','Oct 25','Nov 25','Déc 25','Janv 26','Févr 26','Mars 26','Avr 26','Mai 26'];
  return months.map((m,i) => {
    const t = i/23;
    const seasonality = 1 + 0.18*Math.sin((i/12)*Math.PI*2);
    const improving = 1 - 0.35*t;
    const nm  = Math.round((38 + 14*Math.sin(i*0.6)) * seasonality);
    const fac = Math.round((22 + 9*Math.sin(i*0.5)) * seasonality * improving);
    const mtc = Math.round((11 + 4*Math.sin(i*0.4)) * seasonality * improving);

    const dart = +(((rwc+lti+fat) * 200000)/hours).toFixed(2);
    return {
      month: m, idx: i,
      NM: nm, FAC: fac, MTC: mtc, RWC: rwc, LTI: lti, FAT: fat,
      total: nm+fac+mtc+rwc+lti+fat,
      hours, trir, ltifr, dart,
      observations: Math.round(140 + 60*Math.sin(i*0.5) + 80*t),
      nearMiss: nm,
      inspectionsPlanned: 28 + Math.round(8*Math.sin(i*0.4)),

      ppeCompliance: +(86 + 8*t + 3*Math.sin(i*0.7)).toFixed(1),
      auditFindingsOpen:  Math.round(38 - 14*t + 6*Math.sin(i*0.5)),
      auditFindingsClosed:Math.round(12 + 12*t + 4*Math.cos(i*0.4)),
      complianceRate: +(82 + 12*t + 2*Math.sin(i*0.5)).toFixed(1),
    };
  });
}

/* ===================================================================

   =================================================================== */
const Card = ({ children, className='', padding='p-5', noBorder=false }) => (
  <div className={`bg-white rounded-2xl ${noBorder ? '' : 'border border-line/70'} ${padding} shadow-[0_1px_3px_rgba(15,23,42,.03),0_4px_14px_-3px_rgba(15,23,42,.04)] ${className}`}>{children}</div>
);
const Section = ({ title, action, children, sub, className='', padding='p-5', icon, tone='ink' }) => {
  const tones = { ink:'text-ink-500', teal:'text-teal-600', red:'text-hred-600', orange:'text-horange-600', blue:'text-hblue-600', green:'text-hgreen-600' };
  const accentColors = { ink:'#64748B', teal:'#0D9488', red:'#DC2626', orange:'#EA580C', blue:'#2563EB', green:'#16A34A' };
  return (
    <div className={`section-premium anim-fadeup ${className}`} style={{'--section-accent': accentColors[tone]}}>
      <div className={padding}>
        <div className="flex items-start justify-between mb-4 gap-3">
          <div className="min-w-0">
            <div className="flex items-center gap-2.5">
              {icon && <span className="inline-flex items-center justify-center w-7 h-7 rounded-lg" style={{background:`${accentColors[tone]}12`}}><Icon name={icon} size={14} className={tones[tone]}/></span>}
              <h3 className="text-[14px] font-semibold text-ink-900 leading-tight">{title}</h3>
            </div>
            {sub && <p className="text-[11.5px] text-ink-500 mt-1.5 leading-relaxed">{sub}</p>}
          </div>
          {action && <div className="flex-shrink-0">{action}</div>}
        </div>
        {children}
      </div>
    </div>
  );
};
const Badge = ({ tone='ink', children, dot=false, className='', size='sm' }) => {
  const tones = {
    ink:'bg-ink-100 text-ink-700', teal:'bg-teal-50 text-teal-700', green:'bg-hgreen-50 text-hgreen-700',
    red:'bg-hred-50 text-hred-700', orange:'bg-horange-50 text-horange-700', yellow:'bg-hyellow-50 text-hyellow-600',
    blue:'bg-hblue-50 text-hblue-700', purple:'bg-hpurple-50 text-hpurple-700',
  };
  const dots = { ink:'bg-ink-500', teal:'bg-teal-600', green:'bg-hgreen-500', red:'bg-hred-500', orange:'bg-horange-500', yellow:'bg-hyellow-500', blue:'bg-hblue-500', purple:'bg-hpurple-500' };
  const sz = size==='lg' ? 'px-2.5 py-1 text-[12px]' : 'px-2 py-0.5 text-[11px]';
  return (
    <span className={`inline-flex items-center gap-1.5 rounded-md font-medium ${tones[tone]} ${sz} ${className}`}>
      {dot && <span className={`w-1.5 h-1.5 rounded-full ${dots[tone]}`}></span>}
      {children}
    </span>
  );
};
const Delta = ({ value, suffix='%', invert=false, size='sm' }) => {
  const positive = invert ? value < 0 : value > 0;
  const negative = invert ? value > 0 : value < 0;
  const tone = positive ? 'text-hgreen-700' : negative ? 'text-hred-700' : 'text-ink-500';
  const sym  = value > 0 ? '↑' : value < 0 ? '↓' : '→';
  const cls  = size==='lg' ? 'text-sm' : size==='xs' ? 'text-[10.5px]' : 'text-[11.5px]';
  return (
    <span className={`${cls} font-semibold ${tone} tabular-nums`}>{sym} {Math.abs(value).toFixed(1)}{suffix}</span>
  );
};
const Sparkline = ({ data, color=C.teal, height=28, width=92, fill=true, strokeW=1.6 }) => {
  if (!data || !data.length) return null;
  const max = Math.max(...data), min = Math.min(...data);
  const range = max - min || 1;
  const step = width / Math.max(data.length - 1, 1);
  const points = data.map((v,i) => `${i*step},${height - ((v-min)/range)*height*0.85 - 2}`).join(' ');
  const area = `0,${height} ${points} ${width},${height}`;
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`}>
      {fill && <polyline points={area} fill={color} opacity="0.12" />}
      <polyline points={points} fill="none" stroke={color} strokeWidth={strokeW} strokeLinejoin="round" strokeLinecap="round" />
    </svg>
  );
};
const SparkBar = ({ data, color=C.teal, height=28, width=92 }) => {
  if (!data || !data.length) return null;
  const max = Math.max(...data) || 1;
  const bw = width / data.length;
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`}>
      {data.map((v,i) => {
        const h = (v/max) * (height-2);
        return <rect key={i} x={i*bw+1} y={height-h} width={Math.max(bw-2,1)} height={h} fill={color} opacity={0.35 + 0.65*(v/max)} rx="1"/>;
      })}
    </svg>
  );
};
const CircularGauge = ({ value, max=100, size=110, stroke=10, color=C.teal, trackColor='#E5E7EB', label, unit='' }) => {
  const r = (size - stroke) / 2;
  const circumference = 2 * Math.PI * r;
  const pct = Math.max(0, Math.min(1, value / max));
  const offset = circumference * (1 - pct);
  return (
    <div className="relative inline-flex items-center justify-center" style={{ width:size, height:size }}>
      <svg width={size} height={size}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={trackColor} strokeWidth={stroke} />
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
                strokeLinecap="round" strokeDasharray={circumference} strokeDashoffset={offset}
                transform={`rotate(-90 ${size/2} ${size/2})`} />
      </svg>
      <div className="absolute inset-0 flex flex-col items-center justify-center">
        <span className="font-display text-[24px] font-bold text-ink-900 leading-none tabular-nums">{value}{unit}</span>
        {label && <span className="text-[10px] text-ink-500 mt-1 uppercase tracking-wider">{label}</span>}
      </div>
    </div>
  );
};

// Bullet chart : barre horizontale avec bandes qualitatives + marker target
const BulletChart = ({ value, target, max, label, color=C.teal, bands, unit='', formatVal }) => {
  const pct = Math.min(100, (value/max)*100);
  const tpct = Math.min(100, (target/max)*100);
  const defaultBands = bands || [
    { to: 0.4*max, color:'#FEE2E2' },
    { to: 0.7*max, color:'#FEF3C7' },
    { to: max,     color:'#DCFCE7' },
  ];
  const valTxt = formatVal ? formatVal(value) : value;
  const tgtTxt = formatVal ? formatVal(target) : target;
  return (
    <div className="text-[12px]">
      <div className="flex items-baseline justify-between mb-1.5">
        <span className="text-ink-700 font-medium truncate pr-2">{label}</span>
        <span className="font-mono tabular-nums text-[12px] flex-shrink-0">
          <span className="font-bold text-ink-900">{valTxt}{unit}</span>
          <span className="text-ink-400 ml-1">/ {tgtTxt}{unit}</span>
        </span>
      </div>
      <div className="h-6 rounded relative overflow-hidden bg-ink-100">
        {defaultBands.map((b,i) => {
          const prev = i===0 ? 0 : defaultBands[i-1].to;
          const w = ((b.to-prev)/max)*100;
          const l = (prev/max)*100;
          return <div key={i} className="absolute top-0 bottom-0" style={{ left:`${l}%`, width:`${w}%`, background:b.color, opacity:0.55 }}></div>;
        })}
        <div className="absolute top-1/2 -translate-y-1/2 h-3 rounded-sm" style={{ left:0, width:`${pct}%`, background:color, boxShadow:'0 1px 2px rgba(0,0,0,.15)' }}></div>
        <div className="absolute top-0 bottom-0 w-0.5 bg-ink-900" style={{ left:`${tpct}%` }}>
          <div className="absolute -top-0.5 -left-1 w-2.5 h-1.5 bg-ink-900" style={{ clipPath:'polygon(50% 100%, 0 0, 100% 0)' }}></div>
        </div>
      </div>
    </div>
  );
};

// Waterfall : décomposition variance (Recharts BarChart avec base invisible)
const WaterfallChart = ({ data, height=300 }) => {
  // data: [{ name, value (delta), type:'start'|'positive'|'negative'|'end' }]
  let cumul = 0;
  const enriched = data.map(d => {
    if (d.type==='start' || d.type==='end') {
      const total = d.value;
      const row = { ...d, base:0, displayVal: total, runningTotal: total };
      cumul = total;
      return row;
    }
    const base = d.value >= 0 ? cumul : cumul + d.value;
    const row = { ...d, base, displayVal: Math.abs(d.value), runningTotal: cumul + d.value };
    cumul += d.value;
    return row;
  });
  return (
    <ResponsiveContainer width="100%" height={height}>
      <BarChart data={enriched} margin={{ top:24, right:12, bottom:0, left:-10 }}>
        <CartesianGrid strokeDasharray="2 3" stroke="#EEEEE8" vertical={false}/>
        <XAxis dataKey="name" tick={{ fontSize:10.5, fill:'#475569' }} angle={-15} textAnchor="end" height={50}/>
        <YAxis tick={{ fontSize:10.5, fill:'#64748B' }}/>
        <Tooltip content={({ active, payload }) => {
          if (!active || !payload || !payload[0]) return null;
          const d = payload[0].payload;
          return <div className="bg-white border border-line rounded-lg shadow-md px-3 py-2 text-[11px]">
            <div className="font-semibold text-ink-900">{d.name}</div>
            <div className="font-mono mt-1">{d.type==='start'||d.type==='end' ? `Total : ${d.runningTotal}` : `Δ : ${d.value>0?'+':''}${d.value} · Cumul : ${d.runningTotal}`}</div>
          </div>;
        }}/>
        <Bar dataKey="base" stackId="w" fill="transparent" isAnimationActive={false}/>
        <Bar dataKey="displayVal" stackId="w" radius={[3,3,0,0]} barSize={32}>
          {enriched.map((d,i) => (
            <Cell key={i} fill={
              d.type==='start' ? C.ink600 :
              d.type==='end'   ? C.teal :
              d.value > 0      ? C.greenLight : C.red
            }/>
          ))}
          <LabelList dataKey="value" position="top" formatter={(v)=>(v>0?'+':'')+v} style={{ fontSize:10.5, fontWeight:700, fill:'#0F172A' }}/>
        </Bar>
      </BarChart>
    </ResponsiveContainer>
  );
};

// Funnel SVG custom
const FunnelViz = ({ data, height=260 }) => {
  const max = Math.max(...data.map(d=>d.value));
  const W = 320;
  const slotH = (height - 20) / data.length;
  return (
    <svg viewBox={`0 0 ${W} ${height}`} width="100%" height={height} preserveAspectRatio="xMidYMid meet">
      {data.map((d,i) => {
        const w = (d.value/max) * (W-40);
        const x = (W - w) / 2;
        const y = i * slotH + 10;
        const next = data[i+1];
        const nextW = next ? (next.value/max) * (W-40) : w*0.85;
        const nextX = (W - nextW) / 2;
        const pathD = `M ${x} ${y} L ${x+w} ${y} L ${nextX+nextW} ${y+slotH-4} L ${nextX} ${y+slotH-4} Z`;
        const conv = i>0 ? ((d.value/data[i-1].value)*100).toFixed(0) : 100;
        return (
          <g key={i}>
            <path d={pathD} fill={d.color} opacity={0.92}/>
            <text x={W/2} y={y+slotH/2-2} fill="white" fontSize="11" fontWeight="700" textAnchor="middle">{d.label}</text>
            <text x={W/2} y={y+slotH/2+12} fill="white" fontSize="14" fontWeight="800" textAnchor="middle" fontFamily="Fraunces">{d.value}</text>
            {i>0 && <text x={W-6} y={y+8} fill={C.ink600} fontSize="9.5" fontWeight="600" textAnchor="end">{conv}% ↘</text>}
          </g>
        );
      })}
    </svg>
  );
};

// HeatMatrix générique — utilise rgba (texte crisp, fond seul teinté)
const HeatMatrix = ({ rows, cols, values, colorScale=C.red, format=(v)=>v, cellSize=60, showRowLabels=true, showColLabels=true }) => {
  const flat = values.flat();
  const max = Math.max(...flat) || 1;
  const hex2rgb = h => [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
  const [r0,g0,b0] = hex2rgb(colorScale);
  return (
    <div className="inline-block">
      <div style={{ display:'grid', gridTemplateColumns:`${showRowLabels?'80px':''} repeat(${cols.length}, ${cellSize}px)`, gap:6 }}>
        {showRowLabels && showColLabels && <div></div>}
        {showColLabels && cols.map(c => <div key={c} className="text-[11px] text-ink-600 font-bold text-center pb-2 uppercase tracking-wider">{c}</div>)}
        {rows.map((r, ri) => (
          <Fragment key={r}>
            {showRowLabels && <div className="text-[11.5px] text-ink-700 font-semibold text-right pr-3 self-center">{r}</div>}
            {values[ri].map((v, ci) => {
              const intensity = 0.12 + (v/max)*0.88;
              const isDark = intensity > 0.55;
              return (
                <div key={ci} className="rounded-lg flex items-center justify-center text-[14px] font-bold tabular-nums risk-cell border"
                     style={{
                       width:cellSize, height:cellSize,
                       background:`rgba(${r0},${g0},${b0},${intensity})`,
                       color: isDark ? '#FFFFFF' : C.ink900,
                       borderColor: isDark ? `rgba(${r0},${g0},${b0},1)` : '#E5E7EB',
                       textShadow: isDark ? '0 1px 2px rgba(0,0,0,.25)' : 'none'
                     }}>
                  {format(v)}
                </div>
              );
            })}
          </Fragment>
        ))}
      </div>
    </div>
  );
};

// HeatmapPro : full-width heatmap with tooltip + insights (Days × Hour slots)
const HourlyHeatmap = ({ days, slots, values, colorScale=C.red }) => {
  const [hover, setHover] = useState(null);
  const flat = values.flat();
  const max = Math.max(...flat) || 1;
  const min = Math.min(...flat);
  const total = flat.reduce((a,b)=>a+b, 0);
  const mean = total / flat.length;

  // Hex → RGB
  const hex2rgb = h => [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
  const [r0,g0,b0] = hex2rgb(colorScale);

  // Top picks
  const cells = [];
  values.forEach((row, di) => row.forEach((v, si) => cells.push({ v, day: days[di], slot: slots[si], di, si })));
  const topPicks = [...cells].sort((a,b) => b.v - a.v).slice(0,3);

  return (
    <div className="relative">
      <div className="grid gap-1.5" style={{ gridTemplateColumns: `52px repeat(${slots.length}, 1fr)` }}>
        <div></div>
        {slots.map(s => (
          <div key={s} className="text-[10.5px] font-bold text-ink-500 text-center uppercase tracking-wider pb-1.5">{s}</div>
        ))}
        {days.map((d, di) => (
          <Fragment key={d}>
            <div className="text-[11.5px] font-semibold text-ink-700 text-right pr-2 self-center">{d}</div>
            {slots.map((s, si) => {
              const v = values[di][si];
              const intensity = 0.12 + (v/max)*0.88;
              const isDark = intensity > 0.55;
              const isHover = hover && hover.di===di && hover.si===si;
              return (
                <div key={s}
                     className={`relative rounded-lg flex items-center justify-center font-bold tabular-nums cursor-pointer border-2 transition-all hover:scale-110 hover:z-10 ${isHover?'ring-4 ring-hred-300/50':''}`}
                     style={{
                       aspectRatio:'1 / 1',
                       background:`rgba(${r0},${g0},${b0},${intensity})`,
                       color: isDark ? 'white' : C.ink900,
                       borderColor: isDark ? `rgba(${r0},${g0},${b0},1)` : '#E5E7EB',
                       textShadow: isDark ? '0 1px 2px rgba(0,0,0,0.25)' : 'none',
                       fontSize:'clamp(13px, 2.4vw, 18px)',
                       lineHeight:1,
                     }}
                     onMouseEnter={(e)=>{
                       const cell = e.currentTarget.getBoundingClientRect();
                       const wrap = e.currentTarget.parentElement.parentElement.getBoundingClientRect();
                       setHover({ di, si, day:d, slot:s, v, x: cell.left - wrap.left + cell.width/2, y: cell.top - wrap.top });
                     }}
                     onMouseLeave={()=>setHover(null)}>
                  {v}
                </div>
              );
            })}
          </Fragment>
        ))}
      </div>

      {/* Tooltip pro */}
      {hover && (
        <div className="absolute z-30 pointer-events-none anim-fadeup"
             style={{ left: Math.max(10, Math.min(hover.x - 120, 9999)), top: Math.max(0, hover.y - 96) }}>
          <div className="bg-white rounded-xl shadow-xl border border-line px-3.5 py-2.5 min-w-[240px]"
               style={{ boxShadow:'0 8px 24px -6px rgba(15,23,42,0.18)' }}>
            <div className="flex items-center justify-between text-[10px] text-ink-500 mb-1.5">
              <span className="font-bold uppercase tracking-widest">{hover.day} · {hover.slot}</span>
              <span className="font-mono text-ink-400 text-[10px]">#{hover.di*slots.length+hover.si+1}/{days.length*slots.length}</span>
            </div>
            <div className="flex items-baseline gap-2 mb-2.5">
              <span className="font-display text-[32px] font-bold tabular-nums leading-none" style={{ color: colorScale }}>{hover.v}</span>
              <span className="text-[11px] text-ink-600">incidents</span>
              <span className="ml-auto text-[11px] text-ink-400 font-mono">{(hover.v/total*100).toFixed(1)}%</span>
            </div>
            <div className="border-t border-line pt-2 grid grid-cols-2 gap-2 text-[10.5px]">
              <div className="flex flex-col">
                <span className="text-ink-500 uppercase tracking-wider text-[9px] font-bold">vs moyenne</span>
                <span className={`font-mono font-bold tabular-nums ${hover.v >= mean ? 'text-hred-700' : 'text-hgreen-700'}`}>
                  {hover.v >= mean ? '+' : ''}{(hover.v - mean).toFixed(1)}
                </span>
              </div>
              <div className="flex flex-col">
                <span className="text-ink-500 uppercase tracking-wider text-[9px] font-bold">% du pic max</span>
                <span className="font-mono font-bold tabular-nums text-ink-900">{(hover.v/max*100).toFixed(0)}%</span>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* Insights bar */}
      <div className="mt-3 pt-3 border-t border-line flex items-center justify-between gap-3 flex-wrap text-[10.5px]">
        <div className="flex items-center gap-3">
          <span className="text-ink-500 uppercase tracking-wider text-[9px] font-bold">Top 3 :</span>
          {topPicks.map((p,i) => (
            <span key={i} className="flex items-center gap-1.5">
              <span className="inline-flex items-center justify-center w-5 h-5 rounded-md text-white font-bold text-[10px]" style={{ background:colorScale }}>{p.v}</span>
              <span className="font-semibold text-ink-700">{p.day} {p.slot}</span>
            </span>
          ))}
        </div>
        <div className="flex items-center gap-2">
          <span className="text-ink-400">Échelle :</span>
          <div className="flex items-center gap-0.5">
            {[0.15, 0.30, 0.50, 0.70, 0.90].map(o => <div key={o} className="w-4 h-3 rounded-sm" style={{ background:`rgba(${r0},${g0},${b0},${o})` }}></div>)}
          </div>
          <span className="text-ink-400 font-mono">{min}-{max}</span>
        </div>
      </div>
    </div>
  );
};

// DataTable avec tri + recherche + sparklines
const DataTable = ({ columns, data, searchable=true, sortable=true, pageSize=10, emptyText='Aucune donnée' }) => {
  const [search, setSearch] = useState('');
  const [sortKey, setSortKey] = useState(null);
  const [sortDir, setSortDir] = useState('asc');
  const [page, setPage] = useState(1);
  const filtered = useMemo(() => {
    let r = data;
    if (search) {
      const q = search.toLowerCase();
      r = r.filter(row => columns.some(c => {
        const v = c.accessor ? c.accessor(row) : row[c.key];
        return v && String(v).toLowerCase().includes(q);
      }));
    }
    if (sortKey) {
      const col = columns.find(c=>c.key===sortKey);
      r = [...r].sort((a,b) => {
        const va = col?.accessor ? col.accessor(a) : a[sortKey];
        const vb = col?.accessor ? col.accessor(b) : b[sortKey];
        const cmp = typeof va==='number' && typeof vb==='number' ? va-vb : String(va||'').localeCompare(String(vb||''));
        return sortDir==='asc' ? cmp : -cmp;
      });
    }
    return r;
  }, [data, search, sortKey, sortDir, columns]);
  const totalPages = Math.ceil(filtered.length / pageSize) || 1;
  const paged = filtered.slice((page-1)*pageSize, page*pageSize);
  const handleSort = (k) => {
    if (!sortable) return;
    if (sortKey === k) setSortDir(d => d==='asc'?'desc':'asc');
    else { setSortKey(k); setSortDir('asc'); }
  };
  return (
    <div>
      {searchable && (
        <div className="flex items-center justify-between mb-3 gap-2">
          <div className="relative flex-1 max-w-xs">
            <Icon name="search" size={13} className="absolute left-2.5 top-1/2 -translate-y-1/2 text-ink-400"/>
            <input type="text" placeholder="Rechercher…" value={search} onChange={e=>{setSearch(e.target.value); setPage(1);}}
                   className="w-full text-[12px] border border-line rounded-lg pl-8 pr-3 py-1.5 focus:border-teal-500 focus:ring-1 focus:ring-teal-200 outline-none"/>
          </div>
          <span className="text-[11px] text-ink-500">{filtered.length} résultat{filtered.length>1?'s':''}</span>
        </div>
      )}
      <div className="overflow-x-auto">
        <table className="w-full text-[12px]">
          <thead>
            <tr className="border-b-2 border-line text-[10px] uppercase tracking-wider text-ink-500 font-semibold">
              {columns.map(c => (
                <th key={c.key} className={`text-${c.align||'left'} py-2 px-2 ${sortable?'cursor-pointer hover:text-ink-900':''}`} onClick={()=>handleSort(c.key)}>
                  <span className="inline-flex items-center gap-1">{c.label}{sortable && sortKey===c.key && <span>{sortDir==='asc'?'▲':'▼'}</span>}</span>
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {paged.length === 0 && <tr><td colSpan={columns.length} className="py-8 text-center text-ink-500">{emptyText}</td></tr>}
            {paged.map((row,ri) => (
              <tr key={ri} className="border-b border-line2 table-row-hover transition">
                {columns.map(c => (
                  <td key={c.key} className={`py-2.5 px-2 text-${c.align||'left'} ${c.cellClass||''}`}>
                    {c.render ? c.render(row) : (c.accessor ? c.accessor(row) : row[c.key])}
                  </td>
                ))}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {totalPages > 1 && (
        <div className="flex items-center justify-between mt-3 pt-3 border-t border-line2">
          <span className="text-[11px] text-ink-500">Page {page} / {totalPages}</span>
          <div className="flex items-center gap-1">

// Export CSV utility
const exportCSV = (filename, rows) => {
  if (!rows || !rows.length) return;
  const headers = Object.keys(rows[0]);
  const csv = [
    headers.join(';'),
    ...rows.map(r => headers.map(h => {
      const v = r[h]; const s = v===null||v===undefined ? '' : String(v);
      return s.includes(';')||s.includes('"')||s.includes('\n') ? `"${s.replace(/"/g,'""')}"` : s;
    }).join(';'))
  ].join('\n');
  const blob = new Blob(['﻿'+csv], { type:'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
};

  const pyramid = SEVERITY.map(s => ({ name: s.label, key: s.key, value: YTD[s.key], color: s.color }));
  const distributionPie = SEVERITY.slice().reverse().map(s => ({ name: s.label, value: YTD[s.key], color: s.color }));

  // Heatmap horaire (Jour × Plage)
  const days = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
  const slots = ['00-06','06-12','12-18','18-24'];
  const heatValues = days.map((d,di) => slots.map((s,si) =>
    Math.round(2 + 8*Math.abs(Math.sin(di*1.3+si*0.7)) + (si===1||si===2?4:0) - (d==='Dim'?3:0))
  ));

  // Funnel : Observations → Near-Miss → FAC → MTC → RWC → LTI
  const funnelData = [
    { label:'Observations',  value: YTD.observations, color:C.teal },
    { label:'Near-Miss',     value: YTD.NM,           color:C.blueLight },

    { label:'Restricted Work',value:YTD.RWC,          color:C.orange },

  // Scatter quadrants : Dept (Fréquence × Sévérité)
  const deptScatter = useMemo(() => DEPARTMENTS.map((d,i) => {
    const seed = (i*7 + 13) % 30;
    const freq = Math.round(20 + 60*Math.abs(Math.sin(i*1.3)) + seed);
    const sev  = +(1 + 4*Math.abs(Math.cos(i*0.9)) + ((i*11+3)%10)/10).toFixed(1);
    return { dept: d, freq, sev, score: freq*sev };
  }), []);
  const fMed = deptScatter.reduce((a,d)=>a+d.freq,0)/deptScatter.length;
  const sMed = deptScatter.reduce((a,d)=>a+d.sev,0)/deptScatter.length;

    name: `${s.name.replace('Mine ','')} - ${sv.short}`,
    site: s.name,
    size: Math.round(s.incidents * ({NM:0.5,FAC:0.25,MTC:0.15,RWC:0.07,LTI:0.03}[sv.key])),
    fill: sv.color
  }))).filter(d => d.size > 0);

  // Causes racines (Pareto)
  const causesSorted = [...INCIDENT_CAUSES].sort((a,b)=>b.pct-a.pct);
  let cumPct = 0;
  const causesPareto = causesSorted.map(c => {
    cumPct += c.pct;
    return { ...c, cum: cumPct };
  });

  // Coût des incidents par sévérité
  const costBySev = SEVERITY.slice(0,5).map(s => {
    const inc = RECENT_INCIDENTS.filter(i => i.sev === s.key);
    const cost = YTD[s.key] * ({NM:0,FAC:1100,MTC:8500,RWC:24000,LTI:62000}[s.key] || 0);
    return { name: s.short, cost, count: YTD[s.key], color: s.color };
  });

  return (
    <div className="space-y-5">
      {/* KPI Severity tiles */}
      <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3">
        {SEVERITY.map(s => (
          <KPI key={s.key} label={`${s.short} YTD`} value={YTD[s.key]} icon="incident"
               tone={s.key==='LTI'||s.key==='FAT'?'red':s.key==='RWC'?'orange':s.key==='MTC'?'yellow':s.key==='FAC'?'green':'blue'}

               spark={MONTHLY.slice(-12).map(m=>m[s.key])}
               sub={sevLabel(s.key)}/>

      {/* Pyramide + Funnel + Pie */}

                 sub="Ratio attendu ≥ 100:1 (Near-Miss / LTI). Une base large prédit moins de sommet."
                 icon="layers" tone="teal">
          <div style={{ height: 280 }}>
            <ResponsiveContainer width="100%" height="100%">
              <BarChart data={pyramid} layout="vertical" margin={{ top:5, right:80, bottom:0, left:0 }}>
                <CartesianGrid strokeDasharray="2 3" stroke="#EEEEE8" horizontal={false}/>
                <XAxis type="number" tick={{ fontSize:10.5, fill:'#64748B' }}/>
                <YAxis type="category" dataKey="key" tick={{ fontSize:11, fill:'#334155', fontWeight:600 }} width={50}/>
                <Tooltip content={<CTooltip/>}/>
                <Bar dataKey="value" radius={[0,4,4,0]}>
                  {pyramid.map((d,i)=><Cell key={i} fill={d.color}/>)}
                  <LabelList dataKey="value" position="right" style={{ fontSize: 11, fontWeight: 700, fill:'#0F172A' }}/>
                </Bar>
              </BarChart>
            </ResponsiveContainer>
          </div>
          <div className="mt-3 pt-3 border-t border-line text-[11.5px] text-ink-600 flex items-center gap-2">
            <span>Ratio NM:LTI observé :</span>
            <span className="font-mono font-bold text-ink-900 text-[13px]">{Math.round(YTD.NM / Math.max(1,YTD.LTI))}:1</span>
            <Badge tone={Math.round(YTD.NM / Math.max(1,YTD.LTI)) >= 100 ? 'green' : 'orange'} dot>{Math.round(YTD.NM / Math.max(1,YTD.LTI)) >= 100 ? 'Culture saine' : 'À renforcer'}</Badge>
          </div>
        </Section>

        <Section className="col-span-12 lg:col-span-4" title="Entonnoir de gravité"
                 sub="Conversion des signaux faibles aux accidents graves" icon="trending" tone="orange">
          <FunnelViz data={funnelData} height={280}/>
        </Section>

        <Section className="col-span-12 lg:col-span-3" title="Répartition par sévérité" sub="Distribution YTD" icon="incident" tone="ink">
          <div style={{ height: 200 }}>
            <ResponsiveContainer width="100%" height="100%">
              <PieChart>
                <Pie data={distributionPie} dataKey="value" nameKey="name" innerRadius={50} outerRadius={82} paddingAngle={2}>
                  {distributionPie.map((d,i)=><Cell key={i} fill={d.color}/>)}
                </Pie>
                <Tooltip content={<CTooltip/>}/>
              </PieChart>
            </ResponsiveContainer>
          </div>
          <div className="grid grid-cols-2 gap-1.5 mt-2">
            {distributionPie.map(d => (
              <div key={d.name} className="flex items-center gap-1.5 text-[10.5px]">
                <span className="w-2 h-2 rounded-sm flex-shrink-0" style={{ background: d.color }}></span>
                <span className="text-ink-600 truncate flex-1">{d.name}</span>
                <span className="font-mono font-bold text-ink-900">{d.value}</span>
              </div>
            ))}
          </div>
        </Section>
      </div>

      {/* Scatter quadrants + Heatmap + Coût */}
      <div className="grid grid-cols-12 gap-4">
        <Section className="col-span-12 lg:col-span-5" title="Matrice Fréquence × Sévérité — départements"
                 sub="4 quadrants : haut-droite = priorité maximale" icon="risk" tone="red">

            <ResponsiveContainer width="100%" height="100%">
              <ScatterChart margin={{ top:10, right:14, bottom:10, left:-10 }}>
                <CartesianGrid strokeDasharray="2 3" stroke="#EEEEE8"/>
                <XAxis type="number" dataKey="freq" name="Fréquence" tick={{ fontSize:10.5, fill:'#64748B' }} label={{ value:'Fréquence (incidents/an)', position:'insideBottom', offset:-2, fontSize:10.5, fill:'#64748B' }}/>
                <YAxis type="number" dataKey="sev"  name="Sévérité"  tick={{ fontSize:10.5, fill:'#64748B' }} label={{ value:'Sévérité moy.', angle:-90, position:'insideLeft', fontSize:10.5, fill:'#64748B' }} domain={[0,6]}/>
                <Tooltip content={({ active, payload }) => {
                  if (!active || !payload || !payload[0]) return null;
                  const d = payload[0].payload;
                  return <div className="bg-white border border-line rounded-lg shadow-md px-3 py-2 text-[11px]">
                    <div className="font-bold text-ink-900">{d.dept}</div>
                    <div className="text-ink-600 mt-1">Fréquence <span className="font-mono font-bold">{d.freq}</span> · Sévérité <span className="font-mono font-bold">{d.sev}</span></div>
                    <div className="text-ink-600">Score risque <span className="font-mono font-bold text-hred-700">{Math.round(d.score)}</span></div>
                  </div>;
                }}/>
                <ReferenceLine x={fMed} stroke={C.ink400} strokeDasharray="4 3" label={{ value:'médiane', fontSize:9, fill:C.ink500, position:'top' }}/>
                <ReferenceLine y={sMed} stroke={C.ink400} strokeDasharray="4 3"/>
                <ReferenceArea x1={fMed} x2={120} y1={sMed} y2={6} fill={C.red} fillOpacity={0.06}/>
                <Scatter data={deptScatter}>
                  {deptScatter.map((d,i) => <Cell key={i} fill={d.freq>fMed && d.sev>sMed ? C.red : d.freq>fMed||d.sev>sMed ? C.orange : C.green} fillOpacity={0.75} stroke="white" strokeWidth={1.5}/>)}

        </Section>

        <Section className="col-span-12 lg:col-span-4" title="Heatmap horaire — Jour × Plage"

        </Section>

        <Section className="col-span-12 lg:col-span-3" title="Coût estimé des incidents" sub="Direct + indirect (€)" icon="trending" tone="red">

            <ResponsiveContainer width="100%" height="100%">
              <BarChart data={costBySev} margin={{ top:10, right:10, bottom:0, left:-20 }}>

                <XAxis dataKey="name" tick={{ fontSize:10.5, fill:'#334155', fontWeight:600 }}/>
                <YAxis tick={{ fontSize:10, fill:'#64748B' }} tickFormatter={v=>`${(v/1000).toFixed(0)}k`}/>
                <Tooltip content={<CTooltip formatter={v=>`${v.toLocaleString('fr-FR')} €`}/>}/>
                <Bar dataKey="cost" radius={[4,4,0,0]}>
                  {costBySev.map((d,i)=><Cell key={i} fill={d.color}/>)}
                </Bar>
              </BarChart>
            </ResponsiveContainer>
          </div>
          <div className="mt-2 pt-2 border-t border-line text-center">
            <div className="text-[10.5px] text-ink-500 uppercase tracking-wider">Total YTD</div>
            <div className="text-[20px] font-display font-bold text-hred-700 tabular-nums">{(costBySev.reduce((a,c)=>a+c.cost,0)/1000).toFixed(0)}k €</div>
          </div>
        </Section>
      </div>

      {/* Causes Pareto + Treemap */}
      <div className="grid grid-cols-12 gap-4">
        <Section className="col-span-12 lg:col-span-7" title="Causes racines — Pareto"
                 sub="80% des causes proviennent de 20% des sources (5M)" icon="risk" tone="orange"
                 action={<button onClick={()=>exportCSV('causes_racines_safex.csv', causesPareto)} className="text-[11px] text-teal-700 hover:underline no-print flex items-center gap-1"><Icon name="download" size={11}/>CSV</button>}>
          <div style={{ height: 320 }}>
            <ResponsiveContainer width="100%" height="100%">
              <ComposedChart data={causesPareto} margin={{ top:5, right:30, bottom:0, left:0 }} layout="vertical">
                <CartesianGrid strokeDasharray="2 3" stroke="#EEEEE8" horizontal={false}/>
                <XAxis type="number" tick={{ fontSize:10.5, fill:'#64748B' }} domain={[0, 100]}/>
                <YAxis type="category" dataKey="sub" tick={{ fontSize:10.5, fill:'#334155' }} width={180}/>
                <Tooltip content={<CTooltip/>}/>
                <Bar dataKey="pct" name="% causes" radius={[0,4,4,0]} barSize={16}>
                  {causesPareto.map((c,i) => (
                    <Cell key={i} fill={c.cat==='Facteur Humain'?C.orange:c.cat==='Équipement'?C.blue:c.cat==='Environnement'?C.yellow:c.cat==='EPI'?C.teal:C.green}/>
                  ))}
                  <LabelList dataKey="pct" position="right" formatter={(v)=>`${v}%`} style={{ fontSize:10.5, fontWeight:700, fill:'#334155' }}/>
                </Bar>
              </ComposedChart>
            </ResponsiveContainer>
          </div>
          <div className="mt-3 pt-3 border-t border-line grid grid-cols-5 gap-2 text-[10.5px]">
            {['Facteur Humain','Équipement','Environnement','EPI','Organisation'].map((c,i)=>(
              <div key={c} className="text-center">
                <div className="w-3 h-3 mx-auto rounded-sm mb-1" style={{ background: [C.orange,C.blue,C.yellow,C.teal,C.green][i] }}></div>
                <div className="text-ink-700 font-medium">{c}</div>
              </div>
            ))}
          </div>
        </Section>

        <Section className="col-span-12 lg:col-span-5" title="Treemap incidents — Site × Sévérité"
                 sub="Surface = volume · couleur = sévérité · survolez pour le détail" icon="layers" tone="teal">
          <div style={{ height: 360 }}>
            <ResponsiveContainer width="100%" height="100%">
              <Treemap data={siteTypeTree.filter(d=>d.size>=2)} dataKey="size" stroke="#FFFFFF" fill={C.teal}
                       content={({ x, y, width, height, name, fill, value }) => {
                if (width < 1 || height < 1) return null;
                const parts = (name || '').split(' - ');
                const site = parts[0] || '';
                const sev  = parts[1] || '';
                return (
                  <g>
                    <rect x={x} y={y} width={width} height={height} fill={fill} stroke="white" strokeWidth={2}/>
                    {width >= 60 && height >= 36 && (
                      <Fragment>
                        <text x={x + 7} y={y + 16} fill="white" fontSize="12" fontWeight="800"
                              style={{ paintOrder:'stroke fill', stroke:'rgba(0,0,0,0.3)', strokeWidth:'2.5px' }}
                              pointerEvents="none">{site}</text>
                        {height >= 52 && (
                          <text x={x + 7} y={y + 32} fill="white" fontSize="10.5" fontWeight="600" opacity="0.92"
                                style={{ paintOrder:'stroke fill', stroke:'rgba(0,0,0,0.3)', strokeWidth:'2px' }}
                                pointerEvents="none">{sev}</text>
                        )}
                        {height >= 72 && (
                          <text x={x + 7} y={y + 52} fill="white" fontSize="16" fontWeight="800"
                                style={{ paintOrder:'stroke fill', stroke:'rgba(0,0,0,0.35)', strokeWidth:'3px' }}
                                pointerEvents="none">{value}</text>
                        )}
                      </Fragment>
                    )}
                    {width >= 36 && width < 60 && height >= 28 && (
                      <text x={x + width/2} y={y + height/2 + 4} textAnchor="middle"
                            fill="white" fontSize="14" fontWeight="800"
                            style={{ paintOrder:'stroke fill', stroke:'rgba(0,0,0,0.3)', strokeWidth:'2.5px' }}
                            pointerEvents="none">{value}</text>
                    )}
                  </g>
                );
              }}>
                <Tooltip content={({ active, payload }) => {
                  if (!active || !payload || !payload[0]) return null;
                  const d = payload[0].payload;
                  return <div className="bg-white border border-line rounded-lg shadow-md px-3 py-2 text-[11px]">
                    <div className="font-bold text-ink-900">{d.name}</div>
                    <div className="text-ink-600 mt-0.5">Incidents : <span className="font-mono font-bold">{d.size}</span></div>
                  </div>;
                }}/>
              </Treemap>
            </ResponsiveContainer>
          </div>
        </Section>
      </div>

      {/* Table interactive */}
      <Section title="Derniers incidents déclarés" sub="Tri, recherche, export"
               icon="incident" tone="red"
               action={<button onClick={()=>exportCSV('incidents_safex.csv', RECENT_INCIDENTS)} className="px-3 py-1.5 rounded-lg bg-teal-600 text-white text-[11.5px] font-semibold hover:bg-teal-700 transition flex items-center gap-1.5 no-print"><Icon name="download" size={12}/>Exporter CSV</button>}>
        <DataTable
          data={RECENT_INCIDENTS}
          pageSize={8}
          columns={[
            { key:'id', label:'N°', render:r => <span className="font-mono text-ink-500">{r.id}</span> },
            { key:'title', label:'Description', render:r => <span className="font-medium text-ink-900">{r.title}</span> },
            { key:'site', label:'Site', render:r => <span className="text-ink-600">{(SITES.find(s=>s.id===r.site)||{}).name}</span> },
            { key:'dept', label:'Département', render:r => <span className="text-ink-600">{r.dept}</span> },
            { key:'sev',  label:'Sévérité', align:'center', render:r => <Badge tone={r.sev==='LTI'||r.sev==='FAT'?'red':r.sev==='RWC'?'orange':r.sev==='MTC'?'yellow':r.sev==='FAC'?'green':'blue'}>{r.sev}</Badge> },
            { key:'date', label:'Date', render:r => <span className="font-mono text-ink-600 tabular-nums">{r.date}</span> },
            { key:'cost', label:'Coût (€)', align:'right', render:r => <span className="font-mono tabular-nums">{r.cost ? r.cost.toLocaleString('fr-FR') : '—'}</span> },
            { key:'status', label:'Statut', render:r => <Badge tone={r.status==='Clôturé'?'green':r.status==='Investigation'?'blue':'orange'} dot>{r.status}</Badge> },
          ]}
        />
      </Section>
    </div>
  );
};

window.__SAFEX.PageIncidents = PageIncidents;

                <Line yAxisId="right" type="monotone" dataKey="nearMiss" name="Near-Miss" stroke={C.blue} strokeWidth={2.4} dot={{ r:3.5 }}/>

};

const PageRisk = () => {

    const score = sev * prob;
    if (score >= 16) return { bg:C.red,    label:'Inacceptable' };
    if (score >= 10) return { bg:C.orange, label:'Élevé' };
    if (score >= 5)  return { bg:C.yellow, label:'Modéré' };

    open:  RISKS.filter(r=>r.cat===cat && r.status==='Ouvert').length,
    closed:RISKS.filter(r=>r.cat===cat && r.status==='Maîtrisé').length

            { key:'status', label:'Statut', render:r => <Badge tone={r.status==='Maîtrisé'?'green':'orange'} dot>{r.status}</Badge> },
          ]}
        />
      </Section>
    </div>
  );
};

/* ===================================================================
   CARTE WEST AFRICA — D3 + TopoJSON (world-atlas) — vraies frontières
   =================================================================== */

// Méta des 5 pays miniers (par code ISO numérique)
const COUNTRY_META = {
  '384': { name:'Côte d\'Ivoire', cc:'CI', color:'#FB923C' },
  '288': { name:'Ghana',          cc:'GH', color:'#60A5FA' },
  '854': { name:'Burkina Faso',   cc:'BF', color:'#A78BFA' },
  '466': { name:'Mali',           cc:'ML', color:'#34D399' },
  '324': { name:'Guinée',         cc:'GN', color:'#F87171' },
};
// Pays voisins (contexte gris)
const CONTEXT_ISO = ['686','478','562','566','204','768','430','694','624','562','120','148'];
//   686 Sénégal · 478 Mauritanie · 562 Niger · 566 Nigeria
//   204 Bénin · 768 Togo · 430 Liberia · 694 Sierra Leone · 624 Guinée-Bissau
//   120 Cameroun (extrémité) · 148 Tchad (extrémité)

const MapWestAfrica = ({ sites }) => {
  const [topoData, setTopoData] = useState(null);
  const [loadError, setLoadError] = useState(null);
  const [selected, setSelected] = useState(null);
  const [hoverSite, setHoverSite] = useState(null);
  const [hoverCountry, setHoverCountry] = useState(null);

  // Chargement du world-atlas TopoJSON depuis CDN
  useEffect(() => {
    let cancelled = false;
    fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json')
      .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
      .then(d => { if (!cancelled) setTopoData(d); })
      .catch(e => { if (!cancelled) setLoadError(e.message); });
    return () => { cancelled = true; };
  }, []);

  // Données géo dérivées
  const geo = useMemo(() => {
    if (!topoData || !window.topojson || !window.d3) return null;
    const all = window.topojson.feature(topoData, topoData.objects.countries).features;
    const target  = all.filter(f => COUNTRY_META[String(f.id)]);
    const context = all.filter(f => CONTEXT_ISO.includes(String(f.id)));

    const W = 1000, H = 640;
    // Projection Mercator centrée sur la zone des pays miniers
    const proj = window.d3.geoMercator().fitExtent(
      [[20, 20], [W-20, H-20]],
      { type:'FeatureCollection', features: target }
    );
    const pathGen = window.d3.geoPath().projection(proj);
    return { all, target, context, proj, pathGen, W, H };
  }, [topoData]);

  // Stats par pays
  const countryStats = useMemo(() => {
    if (!geo) return [];
    return geo.target.map(f => {
      const meta = COUNTRY_META[String(f.id)];
      const mines = sites.filter(s => s.cc === meta.cc);
      const incidents = mines.reduce((a,s)=>a+s.incidents, 0);
      const nearMiss  = mines.reduce((a,s)=>a+s.nearMiss, 0);
      const workers   = mines.reduce((a,s)=>a+s.workers, 0);
      const avgTRIR   = mines.length ? +(mines.reduce((a,s)=>a+s.trir,0)/mines.length).toFixed(2) : 0;
      const avgLTIFR  = mines.length ? +(mines.reduce((a,s)=>a+s.ltifr,0)/mines.length).toFixed(2) : 0;
      const totalLTI  = Math.round(incidents * 0.10);
      return { id:String(f.id), feature:f, ...meta, mines:mines.length, workers, incidents, nearMiss, avgTRIR, avgLTIFR, totalLTI };
    });
  }, [geo, sites]);

  // Loading / Error state
  if (loadError) {
    return (
      <div className="relative rounded-lg overflow-hidden border border-line bg-hred-50 flex items-center justify-center" style={{ minHeight:540 }}>
        <div className="text-center p-6">
          <Icon name="incident" size={32} className="text-hred-600 mx-auto mb-2"/>
          <div className="text-[13px] font-semibold text-hred-700">Carte géographique indisponible</div>
          <div className="text-[11.5px] text-ink-600 mt-1">Impossible de charger le fond cartographique :<br/><code className="bg-white px-2 py-0.5 rounded text-[10px] mt-1 inline-block">{loadError}</code></div>
          <div className="text-[10.5px] text-ink-500 mt-2 italic">Vérifiez votre connexion à jsdelivr CDN.</div>
        </div>
      </div>
    );
  }
  if (!geo) {
    return (
      <div className="relative rounded-lg overflow-hidden border border-line bg-gradient-to-br from-hblue-50/30 to-hblue-50/10 flex items-center justify-center" style={{ minHeight:540 }}>
        <div className="text-center">
          <div className="inline-block w-10 h-10 rounded-full border-4 border-teal-600 border-t-transparent anim-pulse" style={{ animation:'spin 1s linear infinite' }}></div>
          <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
          <div className="text-[12px] text-ink-600 mt-3">Chargement des frontières GeoJSON…</div>
          <div className="text-[10.5px] text-ink-400 mt-1 font-mono">world-atlas / countries-50m</div>
        </div>
      </div>
    );
  }

  const { target, context, proj, pathGen, W, H } = geo;

  return (
    <div className="relative rounded-lg overflow-hidden border border-line bg-gradient-to-br from-hblue-50/30 via-white to-hblue-50/20" style={{ minHeight: 540 }}>
      <svg viewBox={`0 0 ${W} ${H}`} className="w-full h-auto block" preserveAspectRatio="xMidYMid meet">
        <defs>
          <linearGradient id="oceanGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#EFF6FF"/>
            <stop offset="100%" stopColor="#DBEAFE"/>
          </linearGradient>
          <pattern id="oceanWaves" width="24" height="24" patternUnits="userSpaceOnUse">
            <path d="M 0 12 Q 6 9 12 12 T 24 12" fill="none" stroke="#93C5FD" strokeWidth="0.4" opacity="0.35"/>
          </pattern>
          <filter id="countryShadow" x="-10%" y="-10%" width="120%" height="120%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
            <feOffset dx="1" dy="2" result="offsetblur"/>
            <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
            <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <radialGradient id="markerGlow">
            <stop offset="0%" stopColor="white" stopOpacity="0.4"/>
            <stop offset="100%" stopColor="white" stopOpacity="0"/>
          </radialGradient>
        </defs>

        {/* Océan */}
        <rect width={W} height={H} fill="url(#oceanGrad)"/>
        <rect width={W} height={H} fill="url(#oceanWaves)"/>

        {/* Graticule (lat/lon) */}
        <g stroke="#94A3B8" strokeWidth="0.4" strokeDasharray="2 4" opacity="0.3">
          {(window.d3.geoGraticule().step([4,4])().coordinates || []).slice(0,40).map((line,i) => {
            const path = pathGen({ type:'LineString', coordinates: line });
            return <path key={i} d={path} fill="none"/>;
          })}
        </g>

        {/* Pays voisins (contexte) */}
        {context.map(f => (
          <path key={'ctx-'+f.id} d={pathGen(f)} fill="#F1F5F9" stroke="#CBD5E1" strokeWidth="0.6" opacity="0.7"/>
        ))}
        {context.map(f => {
          const [cx, cy] = pathGen.centroid(f);
          if (isNaN(cx) || cx < 30 || cx > W-30 || cy < 30 || cy > H-30) return null;
          const labels = { '686':'Sénégal','478':'Mauritanie','562':'Niger','566':'Nigeria','204':'Bénin','768':'Togo','430':'Liberia','694':'Sierra Leone','624':'Guinée-Bissau','120':'Cameroun','148':'Tchad' };
          return <text key={'ctxl-'+f.id} x={cx} y={cy} fontSize="10" fill="#94A3B8" fontWeight="500" textAnchor="middle" pointerEvents="none">{labels[String(f.id)] || ''}</text>;
        })}

        {/* Pays miniers — une couleur par pays */}
        {countryStats.map(c => {

          return (
            <path key={c.id}
                  d={pathGen(c.feature)}
                  fill={c.color}
                  fillOpacity={isSel ? 0.95 : isHov ? 0.85 : 0.78}
                  stroke={isSel ? '#0F172A' : 'white'}

                  filter="url(#countryShadow)"
                  style={{ cursor:'pointer', transition:'fill-opacity 0.2s, stroke 0.2s' }}

/* ===================================================================
   PAGE 8 — TENDANCES 24 MOIS
   =================================================================== */
const PageTrends = () => {
  const baseTrir  = MONTHLY[0].trir, baseLtifr = MONTHLY[0].ltifr, baseNM = MONTHLY[0].NM;
  const baseObs   = MONTHLY[0].observations, baseEpi = MONTHLY[0].ppeCompliance;
  const normalized = MONTHLY.map(m => ({
    month: m.month,
    'TRIR':         +(m.trir/baseTrir*100).toFixed(1),
    'LTIFR':        +(m.ltifr/baseLtifr*100).toFixed(1),
    'Near-Miss':    +(m.NM/baseNM*100).toFixed(1),
    'Observations': +(m.observations/baseObs*100).toFixed(1),
    'EPI':          +(m.ppeCompliance/baseEpi*100).toFixed(1),
  }));

  // Waterfall QoQ
  const q1 = MONTHLY.slice(-9,-6);
  const q3 = MONTHLY.slice(-3);
  const deltaQ = ['NM','FAC','MTC','RWC','LTI'].map(k => {
    const a = q1.reduce((s,m)=>s+m[k],0);
    const b = q3.reduce((s,m)=>s+m[k],0);
    return { name:k, value: b - a, type: (b-a)>0?'positive':'negative' };
  });
  const waterQoQ = [{ name:'Q1 total', value: q1.reduce((s,m)=>s+m.total,0), type:'start' }, ...deltaQ, { name:'Q3 total', value: q3.reduce((s,m)=>s+m.total,0), type:'end' }];

  return (
    <div className="space-y-5">
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
        <KPI label="TRIR M0 vs M-23" value={`${((M_LAST.trir/MONTHLY[0].trir-1)*100).toFixed(1)}%`} icon="trending" tone="green" sub="amélioration 24m"/>
        <KPI label="LTIFR M0 vs M-23" value={`${((M_LAST.ltifr/MONTHLY[0].ltifr-1)*100).toFixed(1)}%`} icon="trending" tone="green" sub="amélioration 24m"/>
        <KPI label="Observations YoY" value={`+${((M_LAST.observations/M_YEAR_AGO.observations-1)*100).toFixed(1)}%`} icon="eye" tone="teal"/>
        <KPI label="EPI YoY" value={`+${((M_LAST.ppeCompliance/M_YEAR_AGO.ppeCompliance-1)*100).toFixed(1)}%`} icon="check" tone="green"/>
      </div>

      <Section title="Tendances normalisées — base 100 = Juin 2024 (M-23)"
               sub="Visualisez l'effort HSE consolidé : courbes qui montent (observations, EPI) compensent celles qui baissent (TRIR, LTIFR)."
               icon="trending" tone="teal">
        <div style={{ height: 380 }}>
          <ResponsiveContainer width="100%" height="100%">
            <LineChart data={normalized} margin={{ top:10, right:12, bottom:0, left:-10 }}>
              <CartesianGrid strokeDasharray="2 3" stroke="#EEEEE8" vertical={false}/>
              <XAxis dataKey="month" tick={{ fontSize:10.5, fill:'#64748B' }} interval={1}/>
              <YAxis tick={{ fontSize:10.5, fill:'#64748B' }}/>
              <Tooltip content={<CTooltip/>}/>
              <Legend iconType="circle" wrapperStyle={{ fontSize:11 }}/>
              <ReferenceLine y={100} stroke={C.ink400} strokeDasharray="4 4" label={{ value:'Base 100', fontSize:10, fill:C.ink500, position:'right' }}/>
              <Line type="monotone" dataKey="TRIR"         stroke={C.red}    strokeWidth={2.5} dot={false}/>
              <Line type="monotone" dataKey="LTIFR"        stroke={C.orange} strokeWidth={2.5} dot={false}/>
              <Line type="monotone" dataKey="Near-Miss"    stroke={C.blue}   strokeWidth={2.2} dot={false}/>
              <Line type="monotone" dataKey="Observations" stroke={C.teal}   strokeWidth={2.5} dot={false}/>
              <Line type="monotone" dataKey="EPI"          stroke={C.green}  strokeWidth={2.2} dot={false}/>
              <Brush dataKey="month" height={24} stroke={C.teal} fill="#F8FAFC"/>
            </LineChart>
          </ResponsiveContainer>
        </div>
      </Section>

      <div className="grid grid-cols-12 gap-4">
        <Section className="col-span-12 lg:col-span-6" title="Variance trimestre — Q3 vs Q1 (waterfall)"
                 sub="Δ absolu par classification de sévérité" icon="trending" tone="teal">
          <WaterfallChart data={waterQoQ} height={300}/>
        </Section>

        <Section className="col-span-12 lg:col-span-6" title="Cumul heures travaillées vs incidents"
                 sub="Échelles indépendantes — 24 mois" icon="bolt" tone="ink">
          <div style={{ height: 300 }}>
            <ResponsiveContainer width="100%" height="100%">
              <ComposedChart data={MONTHLY} margin={{ top:5, right:12, bottom:0, left:-10 }}>
                <CartesianGrid strokeDasharray="2 3" stroke="#EEEEE8" vertical={false}/>
                <XAxis dataKey="month" tick={{ fontSize:10, fill:'#64748B' }} interval={1}/>
                <YAxis yAxisId="left" tick={{ fontSize:10.5, fill:C.teal }} tickFormatter={(v)=>`${(v/1e6).toFixed(1)}M`}/>
                <YAxis yAxisId="right" orientation="right" tick={{ fontSize:10.5, fill:C.red }}/>
                <Tooltip content={<CTooltip/>}/>
                <Legend iconType="circle" wrapperStyle={{ fontSize:11 }}/>
                <Area yAxisId="left" type="monotone" dataKey="hours" name="Heures travaillées" fill={C.teal} fillOpacity={0.15} stroke={C.teal} strokeWidth={2}/>
                <Line yAxisId="right" type="monotone" dataKey="LTI" name="LTI" stroke={C.red} strokeWidth={2.5} dot={{ r:3.5 }}/>
              </ComposedChart>
            </ResponsiveContainer>
          </div>
        </Section>
      </div>
    </div>
  );
};

              <Icon name="search" size={13} className="absolute left-3 top-1/2 -translate-y-1/2 text-ink-400"/>

                     value={search} onChange={e=>setSearch(e.target.value)}
                     className="w-full text-[12.5px] border border-line rounded-lg pl-9 pr-3 py-2.5 focus:border-teal-500 focus:ring-2 focus:ring-teal-100 outline-none"/>
            </div>
            <select value={filterDept} onChange={e=>setFilterDept(e.target.value)}
                    className="w-full text-[12.5px] border border-line rounded-lg px-3 py-2 bg-white focus:border-teal-500 outline-none">
              <option value="all">Tous les départements</option>
              {departments.map(d => <option key={d} value={d}>{d}</option>)}
            </select>
            <div className="max-h-[520px] overflow-y-auto scrollbar-thin -mx-1 px-1 space-y-1.5">
              {filteredEmps.length === 0 && (
                <div className="text-center text-ink-400 text-[12px] py-8">Aucun employé trouvé.</div>
              )}
              {filteredEmps.map(e => {
                const isSel = selectedId === e.id;
                const nbDecl = EMPLOYEE_DECLARATIONS.filter(d=>d.employeeId===e.id).length;
                const riskTone = e.riskScore >= 60 ? 'red' : e.riskScore >= 40 ? 'orange' : e.riskScore >= 20 ? 'yellow' : 'green';
                return (
                  <button key={e.id} onClick={()=>setSelectedId(e.id)}
                          className={`w-full text-left rounded-lg transition border ${isSel?'bg-teal-50 border-teal-300 shadow-sm':'border-line hover:bg-ink-50 hover:border-ink-200'}`}>
                    <div className="flex items-center gap-3 p-2.5">
                      <img src={e.photo} alt={e.name}
                           className="w-11 h-11 rounded-full object-cover flex-shrink-0 shadow-sm border-2 border-white"
                           onError={(ev) => { ev.target.src = empPhotoFallback(e); ev.target.onerror = null; }}/>
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-1.5">
                          <span className="text-[12.5px] font-semibold text-ink-900 truncate">{e.name}</span>
                          {e.gender === 'F' && <span className="text-[9px] text-hpurple-600">♀</span>}
                          {e.gender === 'H' && <span className="text-[9px] text-hblue-600">♂</span>}
                        </div>
                        <div className="text-[10.5px] text-ink-500 truncate">{e.role}</div>
                        <div className="flex items-center gap-1.5 mt-0.5">
                          <span className="text-[9.5px] font-mono text-ink-400">{e.id}</span>
                          <span className="text-[9px] text-ink-400">·</span>
                          <span className="text-[9.5px] text-ink-500">{e.dept}</span>
                        </div>
                      </div>
                      <div className="flex flex-col items-end gap-1 flex-shrink-0">
                        <Badge tone={riskTone}>{e.riskScore}</Badge>
                        <span className="text-[9px] text-ink-400 font-mono">{nbDecl} déc.</span>
                      </div>
                    </div>
                  </button>
                );
              })}
            </div>
          </div>
        </Section>

        {/* Glass stats card (col-7) */}
        <div className="col-span-12 lg:col-span-7">
          <GlassStatsCard employee={selectedEmp} stats={stats} delta={delta} lastIncident={lastIncident}
                          sparkData={trend12.map(t=>t.Déclarations)}
                          totalCost={stats.totalCost}
                          totalLostDays={stats.totalLostDays}
                          riskScore={selectedEmp.riskScore}
                          siteName={site?.name || ''}/>
        </div>
      </div>

      {/* ROW 2 : Profil + KPIs */}
      <div className="grid grid-cols-12 gap-5">
        <Section className="col-span-12 lg:col-span-4" title="Fiche employé" icon="user" tone="teal">
          <div className="flex flex-col items-center text-center pb-4 border-b border-line">
            <div className="relative">
              <img src={selectedEmp.photo} alt={selectedEmp.name}
                   className="w-24 h-24 rounded-full object-cover shadow-lg border-4 border-white ring-2 ring-teal-200"
                   onError={(ev) => { ev.target.src = empPhotoFallback(selectedEmp); ev.target.onerror = null; }}/>
              <div className="absolute -bottom-1 -right-1 w-7 h-7 rounded-full bg-white border-2 border-white shadow-sm flex items-center justify-center"
                   style={{ background: selectedEmp.riskScore>=60?C.red:selectedEmp.riskScore>=40?C.orange:selectedEmp.riskScore>=20?C.yellow:C.green }}>
                <span className="text-[10px] font-bold text-white tabular-nums">{selectedEmp.riskScore}</span>
              </div>
            </div>
            <h3 className="text-[16px] font-display font-bold text-ink-900 mt-3">{selectedEmp.name}</h3>
            <div className="text-[12px] text-ink-500 mt-0.5">{selectedEmp.role}</div>
            <div className="flex items-center gap-2 mt-2 flex-wrap justify-center">
              <Badge tone="teal" dot>{site?.name || 'Groupe'}</Badge>
              <Badge tone="ink">{selectedEmp.dept}</Badge>
              <Badge tone={selectedEmp.riskScore>=60?'red':selectedEmp.riskScore>=40?'orange':selectedEmp.riskScore>=20?'yellow':'green'} dot>Score {selectedEmp.riskScore}/100</Badge>
            </div>
          </div>
          <div className="mt-4 space-y-2 text-[12px]">
            {[
              { label:'Matricule',       value:selectedEmp.id, mono:true },
              { label:'Date d\'embauche', value:selectedEmp.hireDate, mono:true },
              { label:'Ancienneté',      value:`${seniority} an${seniority>1?'s':''}` },
              { label:'Âge',             value:`${selectedEmp.age} ans` },
              { label:'Genre',           value:selectedEmp.gender === 'H' ? 'Homme' : 'Femme' },
              { label:'Quart de travail',value:selectedEmp.shift },
              { label:'Pays',            value:site?.country || '—' },
              { label:'E-mail',          value:selectedEmp.email, mono:true, small:true },
              { label:'Téléphone',       value:selectedEmp.phone, mono:true },
            ].map((row,i) => (
              <div key={i} className="flex items-center justify-between gap-2 py-1.5 border-b border-line2 last:border-0">
                <span className="text-ink-500">{row.label}</span>
                <span className={`${row.mono?'font-mono':''} ${row.small?'text-[10.5px]':''} text-ink-900 text-right truncate`}>{row.value}</span>
              </div>
            ))}
          </div>
        </Section>

        <div className="col-span-12 lg:col-span-8 space-y-5">
          {/* KPI tiles */}
          <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
            <KPI label="Déclarations totales" value={stats.total} icon="report" tone="teal" sub="24 derniers mois"/>
            <KPI label="Jours d'arrêt cumulés" value={stats.totalLostDays} icon="calendar" tone={stats.totalLostDays>0?'red':'green'}/>
            <KPI label="Coût total estimé" value={`${(stats.totalCost/1000).toFixed(1)}k €`} icon="bolt" tone="orange"/>
            <KPI label="Score de risque" value={`${selectedEmp.riskScore}/100`} icon="risk"
                 tone={selectedEmp.riskScore>=60?'red':selectedEmp.riskScore>=40?'orange':selectedEmp.riskScore>=20?'yellow':'green'}
                 sub={`Moy. Groupe ${avgRiskScore}`}/>
          </div>

          {/* Trend chart */}
          <Section title="Évolution des déclarations — 12 mois"
                   sub={`Activité mensuelle de ${selectedEmp.name.split(' ')[0]}`} icon="trending" tone="teal">
            <div style={{ height: 220 }}>
              <ResponsiveContainer width="100%" height="100%">
                <ComposedChart data={trend12} margin={{ top:10, right:12, bottom:0, left:-15 }}>
                  <defs>
                    <linearGradient id="empTrend" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="0%" stopColor={C.teal} stopOpacity={0.35}/>
                      <stop offset="100%" stopColor={C.teal} stopOpacity={0.02}/>
                    </linearGradient>
                  </defs>
                  <CartesianGrid strokeDasharray="2 3" stroke="#EEEEE8" vertical={false}/>
                  <XAxis dataKey="month" tick={{ fontSize:10, fill:'#64748B' }}/>
                  <YAxis tick={{ fontSize:10.5, fill:'#64748B' }} allowDecimals={false}/>
                  <Tooltip content={<CTooltip/>}/>
                  <Area type="monotone" dataKey="Déclarations" stroke={C.teal} fill="url(#empTrend)" strokeWidth={2.5}/>
                  <Line type="monotone" dataKey="Déclarations" stroke={C.teal} strokeWidth={0} dot={{ r:4, fill:C.teal, stroke:'white', strokeWidth:2 }}/>
                </ComposedChart>
              </ResponsiveContainer>
            </div>
          </Section>
        </div>
      </div>

      {/* ROW 3 : Distribution types + Comparateur */}
      <div className="grid grid-cols-12 gap-5">
        <Section className="col-span-12 lg:col-span-5" title="Répartition par type"
                 sub={`${stats.total} déclaration${stats.total>1?'s':''} sur 24 mois`} icon="layers" tone="orange">
          {typeDist.length === 0 ? (
            <div className="text-center text-ink-400 text-[12px] py-12">Aucune déclaration historique.</div>
          ) : (
            <div className="grid grid-cols-2 gap-3 items-center">
              <div style={{ height: 200 }}>
                <ResponsiveContainer width="100%" height="100%">
                  <PieChart>
                    <Pie data={typeDist} dataKey="value" nameKey="name" innerRadius={45} outerRadius={80} paddingAngle={2}>
                      {typeDist.map((d,i)=><Cell key={i} fill={d.color}/>)}
                    </Pie>
                    <Tooltip content={<CTooltip/>}/>
                  </PieChart>
                </ResponsiveContainer>
              </div>
              <div className="space-y-1.5">
                {typeDist.map(t => (
                  <div key={t.name} className="flex items-center gap-2 text-[11.5px]">
                    <span className="w-2.5 h-2.5 rounded-sm flex-shrink-0" style={{ background: t.color }}></span>
                    <span className="text-ink-600 flex-1 truncate">{t.name}</span>
                    <span className="font-mono font-bold tabular-nums text-ink-900">{t.value}</span>
                  </div>
                ))}
              </div>
            </div>
          )}
        </Section>

        <Section className="col-span-12 lg:col-span-7" title="Comparaison — Employé vs département vs Groupe"
                 sub={`Nombre moyen de déclarations / employé / 24 mois`} icon="trending" tone="blue">
          <div style={{ height: 220 }}>
            <ResponsiveContainer width="100%" height="100%">
              <BarChart data={[
                { axis:'Cet employé',       v: stats.total,                    fill:C.teal },
                { axis:`Moy. ${selectedEmp.dept}`, v: +deptAvg.toFixed(1),     fill:C.blue },
                { axis:'Moy. Groupe',       v: +empAvgIncidents.toFixed(1),   fill:C.ink500 },
              ]} margin={{ top:24, right:12, bottom:0, left:-20 }}>
                <CartesianGrid strokeDasharray="2 3" stroke="#EEEEE8" vertical={false}/>
                <XAxis dataKey="axis" tick={{ fontSize:11.5, fill:'#334155', fontWeight:600 }}/>
                <YAxis tick={{ fontSize:10.5, fill:'#64748B' }} allowDecimals={false}/>
                <Tooltip content={<CTooltip/>}/>
                <Bar dataKey="v" name="Déclarations" radius={[8,8,0,0]} barSize={60}>
                  {[C.teal, C.blue, C.ink500].map((c,i) => <Cell key={i} fill={c}/>)}
                  <LabelList dataKey="v" position="top" style={{ fontSize:13, fontWeight:700, fill:'#0F172A' }}/>
                </Bar>
              </BarChart>
            </ResponsiveContainer>
          </div>
          <div className="mt-3 pt-3 border-t border-line text-[11.5px] text-ink-600 leading-relaxed">
            {stats.total > deptAvg ? (
              <span><strong className="text-horange-700">Au-dessus</strong> de la moyenne du département {selectedEmp.dept} ({deptAvg.toFixed(1)}). Indique un employé très impliqué dans la déclaration HSE OU un poste à risque accru — à analyser.</span>
            ) : (
              <span><strong className="text-hgreen-700">En-dessous</strong> de la moyenne {selectedEmp.dept} ({deptAvg.toFixed(1)}). Vérifier si sous-déclaration ou réelle exposition réduite.</span>
            )}
          </div>
        </Section>
      </div>

      {/* ROW 4 : Détail des déclarations */}
      <Section title={`Historique détaillé des déclarations — ${selectedEmp.name}`}
               sub={`${empDecls.length} entrée${empDecls.length>1?'s':''} · tri par date décroissante`}
               icon="report" tone="teal"
               action={
                 <button onClick={()=>exportCSV(`declarations_${selectedEmp.id}.csv`, empDecls)}
                         className="px-3 py-1.5 rounded-lg bg-teal-600 text-white text-[11.5px] font-semibold hover:bg-teal-700 transition flex items-center gap-1.5 no-print">
                   <Icon name="download" size={12}/> Exporter CSV
                 </button>
               }>
        {empDecls.length === 0 ? (
          <div className="text-center py-12">
            <Icon name="check" size={32} className="text-hgreen-500 mx-auto mb-2"/>
            <div className="text-[13px] text-ink-600 font-medium">Aucune déclaration historique pour cet employé.</div>
            <div className="text-[11px] text-ink-400 mt-1">L'absence peut indiquer un poste à faible exposition, ou une sous-déclaration à investiguer.</div>
          </div>
        ) : (
          <DataTable
            data={empDecls}
            pageSize={10}
            columns={[
              { key:'id',    label:'N°',          render:r => <span className="font-mono text-ink-500 text-[11px]">{r.id}</span> },
              { key:'date',  label:'Date',        render:r => <span className="font-mono text-ink-700 tabular-nums">{r.date}</span> },
              { key:'type',  label:'Type', align:'center', render:r => {
                  const map = {NM:'blue',FAC:'green',MTC:'yellow',RWC:'orange',LTI:'red',FAT:'red',HAZARD:'yellow'};
                  return <Badge tone={map[r.type]}>{r.type}</Badge>;
                } },
              { key:'title', label:'Description', render:r => <span className="font-medium text-ink-900">{r.title}</span> },
              { key:'location', label:'Lieu',     render:r => <span className="text-ink-600 text-[11.5px]">{r.location}</span> },
              { key:'witnesses', label:'Témoins', align:'center', render:r => <span className="font-mono tabular-nums">{r.witnesses}</span> },
              { key:'lostDays', label:'Jours arrêt', align:'right', render:r => <span className="font-mono tabular-nums font-semibold" style={{ color: r.lostDays>0?C.red:C.ink400 }}>{r.lostDays || '—'}</span> },
              { key:'cost', label:'Coût (€)', align:'right', render:r => <span className="font-mono tabular-nums">{r.cost?r.cost.toLocaleString('fr-FR'):'—'}</span> },
              { key:'status', label:'Statut', render:r => <Badge tone={r.status==='Clôturé'?'green':r.status==='Investigation'?'blue':'orange'} dot>{r.status}</Badge> },
            ]}
          />
        )}
      </Section>
      </>)}
    </div>
  );
};

// Half-circle gauge (style screenshot Patient Falls)
const HalfGauge = ({ value, max=100, label, valueLabel, color }) => {
  const r = 60;
  const pct = Math.max(0, Math.min(1, value/max));
  const angle = Math.PI * pct;
  const cx = 90, cy = 80;
  const needleX = cx - r * Math.cos(angle);
  const needleY = cy - r * Math.sin(angle);
  return (
    <div className="flex flex-col items-center">
      <svg width="180" height="110" viewBox="0 0 180 110">
        {/* Background arcs (3 zones) */}
        <path d="M 30 80 A 60 60 0 0 1 60 28.6" fill="none" stroke="#DC2626" strokeWidth="14"/>
        <path d="M 60 28.6 A 60 60 0 0 1 120 28.6" fill="none" stroke="#EAB308" strokeWidth="14"/>
        <path d="M 120 28.6 A 60 60 0 0 1 150 80" fill="none" stroke="#16A34A" strokeWidth="14"/>
        {/* Needle */}
        <line x1={cx} y1={cy} x2={needleX} y2={needleY} stroke={C.ink900} strokeWidth="3" strokeLinecap="round"/>
        <circle cx={cx} cy={cy} r="6" fill={C.ink900}/>
        <circle cx={cx} cy={cy} r="3" fill="white"/>
        {/* Ticks */}
        <text x="22" y="100" fontSize="9" fill={C.ink500} fontWeight="600">0</text>
        <text x="56" y="20" fontSize="9" fill={C.ink500} fontWeight="600">25</text>
        <text x="86" y="14" fontSize="9" fill={C.ink500} fontWeight="600">50</text>
        <text x="118" y="20" fontSize="9" fill={C.ink500} fontWeight="600">75</text>
        <text x="148" y="100" fontSize="9" fill={C.ink500} fontWeight="600">100</text>
      </svg>
      <div className="mt-1 rounded-full px-3 py-1.5 flex items-center gap-2" style={{ background:color, color:'white' }}>
        <span className="font-display font-bold text-[16px] tabular-nums">{valueLabel || value}</span>
      </div>
      {label && <div className="mt-1 text-[11px] text-ink-600 font-medium">{label}</div>}
    </div>
  );
};
