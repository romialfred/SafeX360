          <div className="relative rounded-b-xl overflow-hidden" style={{ background: mode==='skeleton' ? 'radial-gradient(ellipse at center, #1E293B 0%, #020617 100%)' : 'radial-gradient(ellipse at center, #0B1220 0%, #020617 100%)', minHeight: 720 }}>
            <div className="scan-line"></div>
            <div className="absolute inset-0" style={{ background: mode==='skeleton' ? 'radial-gradient(circle at 50% 50%, rgba(148,163,184,0.12), transparent 60%)' : 'radial-gradient(circle at 50% 50%, rgba(20,184,166,0.12), transparent 60%)' }}></div>
            <svg className="absolute inset-0 w-full h-full opacity-15" preserveAspectRatio="none">
              <defs>
                <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                  <path d="M 40 0 L 0 0 0 40" fill="none" stroke={mode==='skeleton'?'#94A3B8':'#14B8A6'} strokeWidth="0.5"/>
                </pattern>
              </defs>
              <rect width="100%" height="100%" fill="url(#grid)"/>
            </svg>

            {/* HUD top */}
            <div className="absolute top-3 left-3 right-3 flex items-center justify-between z-10">
              <div className="flex items-center gap-2">
                <Badge tone="teal" dot>{mode==='skeleton'?'Mode squelette':'Mode anatomique'}</Badge>
                <Badge tone="ink" className="bg-ink-800/60 text-teal-300 border border-teal-500/30">Vue {view === 'front' ? 'face' : 'dos'}</Badge>
                <Badge tone="ink" className="bg-ink-800/60 text-teal-300 border border-teal-500/30">{filtered.length} zones</Badge>
              </div>
              <div className="text-[10px] text-teal-300/70 font-mono tabular-nums">SAFEX SCAN · {new Date().toISOString().slice(0,19).replace('T',' ')}</div>
            </div>

            {/* Body + Labels poster style */}
            <div className="relative flex items-center justify-center pt-12 pb-16">
              <svg viewBox="0 0 700 580" width="100%" height="700" style={{ maxWidth:'860px' }}>
                <defs>
                  <radialGradient id="zoneGlowR"><stop offset="0%" stopColor={C.red} stopOpacity="0.95"/><stop offset="100%" stopColor={C.red} stopOpacity="0"/></radialGradient>
                  <radialGradient id="zoneGlowO"><stop offset="0%" stopColor={C.orange} stopOpacity="0.95"/><stop offset="100%" stopColor={C.orange} stopOpacity="0"/></radialGradient>
                  <radialGradient id="zoneGlowG"><stop offset="0%" stopColor={C.green} stopOpacity="0.95"/><stop offset="100%" stopColor={C.green} stopOpacity="0"/></radialGradient>
                </defs>

                {/* Body or Skeleton — centered with offset x=150 (body is 0-400) */}
                <g transform="translate(150, 20)" className={mode==='skeleton'?'':'body-glow'}>
                  {mode==='skeleton'
                    ? (view==='front' ? SKELETON_FRONT : SKELETON_BACK)
                    : (view==='front' ? SILHOUETTE_FRONT : SILHOUETTE_BACK)
                  }

                  {/* Zones overlay (always visible) */}
                  {filtered.map(z => {
                    const color = zoneColor(z.count);
                    const isSel = sel && sel.id === z.id;
                    const isHover = hover && hover.zone.id === z.id;
                    const radius = 14 + (z.count/maxCount)*6;
                    const grad = color === C.red ? 'url(#zoneGlowR)' : color === C.orange ? 'url(#zoneGlowO)' : 'url(#zoneGlowG)';
                    const isHigh = z.count >= maxCount*0.66;
                    return (
                      <g key={z.id}
                         onMouseEnter={(e)=>{
                           const rect = e.currentTarget.ownerSVGElement.getBoundingClientRect();
                           const containerRect = e.currentTarget.ownerSVGElement.parentElement.parentElement.getBoundingClientRect();
                           setHover({ zone: z, x: rect.left - containerRect.left + (z.cx+150)*(rect.width/700), y: rect.top - containerRect.top + (z.cy+20)*(rect.height/580) });
                         }}
                         onMouseLeave={()=>setHover(null)}
                         onClick={()=>setSelected(z)}
                         style={{ cursor:'pointer' }}>
                        <circle cx={z.cx} cy={z.cy} r={radius+12} fill={grad} className={isHigh?'body-pulse-strong':''}/>
                        <circle cx={z.cx} cy={z.cy} r={radius} fill={color} fillOpacity={isSel||isHover?0.98:0.85} stroke="white" strokeWidth={isSel||isHover?2.5:1.2}/>
                        <text x={z.cx} y={z.cy+4} textAnchor="middle" fontSize="12" fontWeight="800" fill="white" style={{ pointerEvents:'none', textShadow:'0 1px 2px rgba(0,0,0,.6)' }}>{z.count}</text>
                      </g>
                    );
                  })}
                </g>

                {/* ===== LABELS POSTER — gauche & droite ===== */}
                {filtered.map(z => {
                  const isLeft = z.cx < 200;
                  // World position with translate(150, 20)
                  const wx = z.cx + 150;
                  const wy = z.cy + 20;
                  // Label position : bord du viewBox, ordonnée alignée
                  const labelX = isLeft ? 8 : 692;
                  const stubX  = isLeft ? 150 : 550;
                  const color = zoneColor(z.count);
                  return (
                    <g key={'lbl-'+z.id} className="body-zone" style={{ cursor:'pointer' }} onClick={()=>setSelected(z)}>
                      {/* Connection line */}
                      <path d={`M ${wx} ${wy} L ${stubX} ${wy} L ${labelX + (isLeft?0:0)} ${wy}`}
                            fill="none" stroke={color} strokeWidth="0.8" strokeDasharray="2 2" opacity="0.7"/>
                      {/* Tick at zone */}
                      <circle cx={wx} cy={wy} r="1.8" fill={color}/>
                      {/* Label background */}
                      <rect x={isLeft ? labelX : labelX - 138}
                            y={wy - 10}
                            width="138" height="20" rx="3"
                            fill="rgba(15,23,42,0.7)" stroke={color} strokeWidth="0.6" strokeOpacity="0.6"/>
                      {/* Label text */}
                      <text x={isLeft ? labelX + 6 : labelX - 6}
                            y={wy + 4}
                            textAnchor={isLeft ? 'start' : 'end'}
                            fontSize="10.5" fontWeight="600" fill="#E2E8F0">
                        {z.label}
                      </text>
                      {/* Count badge */}
                      <circle cx={isLeft ? labelX + 128 : labelX - 128} cy={wy} r="7" fill={color}/>
                      <text x={isLeft ? labelX + 128 : labelX - 128} y={wy + 3.5}
                            textAnchor="middle" fontSize="9" fontWeight="800" fill="white">{z.count}</text>
                    </g>
                  );
                })}
              </svg>

              {/* ===== TOOLTIP RAFFINÉ ===== */}
              {hover && (
                <div className="absolute pointer-events-none anim-fadeup z-30"
                     style={{
                       left: Math.min(Math.max(hover.x, 180), 540) - 130,
                       top: Math.max(hover.y - 200, 60),
                     }}>
                  <div className="w-72 rounded-xl overflow-hidden shadow-2xl border border-teal-400/40"
                       style={{ background:'linear-gradient(135deg, rgba(15,23,42,0.98) 0%, rgba(2,6,23,0.98) 100%)', backdropFilter:'blur(8px)' }}>
                    {/* Header */}
                    <div className="px-3.5 py-2.5 border-b border-teal-400/20 flex items-center gap-2"
                         style={{ background: `linear-gradient(90deg, ${zoneColor(hover.zone.count)}30 0%, transparent 100%)` }}>
                      <div className="w-2 h-2 rounded-full" style={{ background: zoneColor(hover.zone.count), boxShadow:`0 0 8px ${zoneColor(hover.zone.count)}` }}></div>
                      <div className="text-[12.5px] font-bold text-white tracking-tight">{hover.zone.label}</div>
                      <div className="ml-auto text-[9.5px] font-mono text-teal-300/70">{hover.zone.id}</div>
                    </div>
                    {/* Body */}
                    <div className="px-3.5 py-3 space-y-2.5">
                      <div className="flex items-baseline gap-2">
                        <span className="font-display text-[28px] font-bold tabular-nums leading-none" style={{ color: zoneColor(hover.zone.count) }}>{hover.zone.count}</span>
                        <span className="text-[10px] uppercase tracking-wider text-ink-400 font-semibold">incidents · 24 mois</span>
                      </div>
                      {/* Severity breakdown */}
                      <div>
                        <div className="text-[9px] uppercase tracking-wider text-ink-500 font-bold mb-1">Sévérité</div>
                        <div className="flex items-center gap-0.5 rounded overflow-hidden h-2">
                          {SEVERITY.slice(0,5).map(s => {
                            const v = hover.zone.sev[s.key];
                            const w = (v/hover.zone.count)*100;
                            if (w === 0) return null;
                            return <div key={s.key} title={`${s.short} : ${v}`} style={{ width:`${w}%`, background:s.color }}></div>;
                          })}
                        </div>
                        <div className="flex items-center gap-2 mt-1.5 text-[9.5px] flex-wrap">
                          {SEVERITY.slice(0,5).filter(s=>hover.zone.sev[s.key]>0).map(s => (
                            <span key={s.key} className="flex items-center gap-1 text-ink-300">
                              <span className="w-1.5 h-1.5 rounded-sm" style={{ background:s.color }}></span>
                              <span className="font-mono">{s.short} {hover.zone.sev[s.key]}</span>
                            </span>
                          ))}
                        </div>
                      </div>
                      {/* Types */}
                      <div>
                        <div className="text-[9px] uppercase tracking-wider text-ink-500 font-bold mb-1">Types de blessures</div>
                        <div className="flex flex-wrap gap-1">
                          {hover.zone.types.map(t => (
                            <span key={t} className="px-1.5 py-0.5 rounded text-[9.5px] bg-teal-500/15 text-teal-300 border border-teal-500/30">{t}</span>
                          ))}
                        </div>
                      </div>
                      {/* Last incident */}
                      <div className="flex items-center justify-between pt-2 border-t border-ink-800">
                        <span className="text-[9.5px] text-ink-500 uppercase tracking-wider font-semibold">Dernier inc.</span>
                        <span className="font-mono text-[10.5px] text-teal-300">{hover.zone.lastInc}</span>
                      </div>
                    </div>
                  </div>
                  {/* Arrow pointer */}
                  <div className="w-3 h-3 rotate-45 mx-auto -mt-1.5 border-r border-b border-teal-400/40"
                       style={{ background:'rgba(2,6,23,0.98)' }}></div>
                </div>
              )}
            </div>

            {/* Bottom HUD */}
            <div className="absolute bottom-3 left-3 right-3 flex items-center justify-between z-10 flex-wrap gap-2">
              <div className="flex items-center gap-3 bg-ink-900/70 backdrop-blur rounded-lg px-3 py-2 border border-teal-500/20">
                <div className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-full" style={{ background:C.green }}></span><span className="text-[10.5px] text-ink-300 font-medium">Faible</span></div>
                <div className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-full" style={{ background:C.orange }}></span><span className="text-[10.5px] text-ink-300 font-medium">Modéré</span></div>
                <div className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-full" style={{ background:C.red }}></span><span className="text-[10.5px] text-ink-300 font-medium">Élevé</span></div>
              </div>
              <div className="flex items-center gap-1 bg-ink-900/70 backdrop-blur rounded-lg p-1 border border-teal-500/20">
                {['all','NM','FAC','MTC','RWC','LTI'].map(f => (
                  <button key={f} onClick={()=>setFilter(f)}
                          className={`px-2.5 py-1 rounded text-[10.5px] font-bold transition ${filter===f?'bg-teal-500 text-white':'text-teal-300 hover:bg-ink-800'}`}>
                    {f==='all'?'TOUS':f}
                  </button>
                ))}
              </div>
            </div>
          </div>
        </Section>

        {/* Panel détail (col-5) */}
        <div className="col-span-12 xl:col-span-5 space-y-4">
          <Card padding="p-5" className="anim-fadeup">
            <div className="flex items-start justify-between mb-3">
              <div>
                <div className="text-[10px] uppercase tracking-widest text-teal-700 font-bold">Zone sélectionnée</div>
                <h3 className="text-[20px] font-display font-bold text-ink-900 mt-1">{sel.label}</h3>
                <div className="flex items-center gap-2 mt-1">
                  <Badge tone={zoneColor(sel.count)===C.red?'red':zoneColor(sel.count)===C.orange?'orange':'green'} dot>
                    {zoneColor(sel.count)===C.red?'Zone à risque élevé':zoneColor(sel.count)===C.orange?'Zone à risque modéré':'Zone à risque faible'}
                  </Badge>
                  <span className="text-[11px] text-ink-500">Dernier inc. : <span className="font-mono">{sel.lastInc}</span></span>
                </div>
              </div>
              <div className="text-right">
                <div className="font-display text-[36px] font-bold tabular-nums leading-none" style={{ color: zoneColor(sel.count) }}>{sel.count}</div>
                <div className="text-[10px] text-ink-500 uppercase tracking-wider">incidents</div>
              </div>
            </div>
            <div className="mt-4">
              <div className="text-[10.5px] uppercase tracking-wider text-ink-500 font-bold mb-2">Répartition par sévérité</div>
              <div style={{ height: 130 }}>
                <ResponsiveContainer width="100%" height="100%">
                  <BarChart data={sevBreakdown} margin={{ top:5, right:5, bottom:0, left:-25 }}>
                    <CartesianGrid strokeDasharray="2 3" stroke="#EEEEE8" vertical={false}/>
                    <XAxis dataKey="name" tick={{ fontSize:11, fill:'#334155', fontWeight:600 }}/>
                    <YAxis tick={{ fontSize:9.5, fill:'#64748B' }}/>
                    <Tooltip content={<CTooltip/>}/>
                    <Bar dataKey="value" radius={[4,4,0,0]}>
                      {sevBreakdown.map((d,i)=><Cell key={i} fill={d.color}/>)}
                      <LabelList dataKey="value" position="top" style={{ fontSize:10, fontWeight:700, fill:'#0F172A' }}/>
                    </Bar>
                  </BarChart>
                </ResponsiveContainer>
              </div>
            </div>
            <div className="mt-3 pt-3 border-t border-line">
              <div className="text-[10.5px] uppercase tracking-wider text-ink-500 font-bold mb-2">Types de blessures</div>
              <div className="flex flex-wrap gap-1.5">
                {sel.types.map(t => <Badge key={t} tone="teal">{t}</Badge>)}
              </div>
            </div>
            <div className="mt-3 pt-3 border-t border-line grid grid-cols-3 gap-2 text-center">
              <div className="bg-ink-50 rounded-lg p-2">
                <div className="text-[9px] uppercase text-ink-500 font-bold tracking-wider">% du total</div>
                <div className="font-mono text-[14px] font-bold text-ink-900 mt-1">{((sel.count/totalInjuries)*100).toFixed(1)}%</div>
              </div>
              <div className="bg-ink-50 rounded-lg p-2">
                <div className="text-[9px] uppercase text-ink-500 font-bold tracking-wider">LTI</div>
                <div className="font-mono text-[14px] font-bold mt-1" style={{ color: sel.sev.LTI>0?C.red:C.ink600 }}>{sel.sev.LTI}</div>
              </div>
              <div className="bg-ink-50 rounded-lg p-2">
                <div className="text-[9px] uppercase text-ink-500 font-bold tracking-wider">EPI requis</div>
                <div className="font-mono text-[14px] font-bold text-teal-700 mt-1">{sel.id.includes('hand')?'Gants':sel.id.includes('foot')?'Chauss.':sel.id.includes('head')||sel.id.includes('face')?'Casque':sel.id.includes('back')?'Ceinture':'EPI std'}</div>
              </div>
            </div>
          </Card>

          {/* Top zones */}
          <Section title="Top 8 zones les plus touchées" sub="Toutes vues confondues" icon="trending" tone="red" padding="p-5">
            <div className="space-y-2">
              {[...allZones].sort((a,b)=>b.count-a.count).slice(0,8).map((z,i) => {
                const color = zoneColor(z.count);
                const pct = (z.count/topZone.count)*100;
                return (
                  <div key={z.id} className="flex items-center gap-2 cursor-pointer hover:bg-ink-50/60 rounded px-2 py-1.5 transition" onClick={()=>setSelected(z)}>
                    <span className="w-5 text-ink-400 font-mono text-right tabular-nums text-[11px]">{i+1}</span>
                    <span className="w-2 h-2 rounded-full flex-shrink-0" style={{ background: color }}></span>
                    <span className="flex-1 text-[12px] text-ink-700 truncate">{z.label}</span>
                    <div className="w-24 h-1.5 bg-ink-100 rounded overflow-hidden">
                      <div className="h-full rounded" style={{ width:`${pct}%`, background: color }}></div>
                    </div>
                    <span className="font-mono tabular-nums font-bold text-[12px] w-7 text-right" style={{ color }}>{z.count}</span>
                  </div>
                );
              })}
            </div>
          </Section>
        </div>
      </div>

      {/* Trend + Types + Half gauges */}
      <div className="grid grid-cols-12 gap-4">
        <Section className="col-span-12 lg:col-span-6" title="Évolution 12 mois — top 4 zones"
                 sub="Stacked area — vérifier l'efficacité des actions ciblées" icon="trending" tone="teal">
          <div style={{ height: 280 }}>
            <ResponsiveContainer width="100%" height="100%">
              <AreaChart data={trendData} margin={{ top:5, right:12, bottom:0, left:-10 }}>
                <defs>
                  <linearGradient id="gMains" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={C.red} stopOpacity={0.6}/><stop offset="100%" stopColor={C.red} stopOpacity={0.05}/></linearGradient>
                  <linearGradient id="gDos" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={C.purple} stopOpacity={0.6}/><stop offset="100%" stopColor={C.purple} stopOpacity={0.05}/></linearGradient>
                  <linearGradient id="gGenoux" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={C.orange} stopOpacity={0.6}/><stop offset="100%" stopColor={C.orange} stopOpacity={0.05}/></linearGradient>
                  <linearGradient id="gPieds" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={C.teal} stopOpacity={0.6}/><stop offset="100%" stopColor={C.teal} stopOpacity={0.05}/></linearGradient>
                </defs>
                <CartesianGrid strokeDasharray="2 3" stroke="#EEEEE8" vertical={false}/>
                <XAxis dataKey="month" tick={{ fontSize:10, fill:'#64748B' }}/>
                <YAxis tick={{ fontSize:10.5, fill:'#64748B' }}/>
                <Tooltip content={<CTooltip/>}/>
                <Legend iconType="circle" wrapperStyle={{ fontSize:11 }}/>
                <Area type="monotone" dataKey="Mains" stackId="1" stroke={C.red} fill="url(#gMains)" strokeWidth={2}/>
                <Area type="monotone" dataKey="Bas du dos" stackId="1" stroke={C.purple} fill="url(#gDos)" strokeWidth={2}/>
                <Area type="monotone" dataKey="Genoux" stackId="1" stroke={C.orange} fill="url(#gGenoux)" strokeWidth={2}/>
                <Area type="monotone" dataKey="Pieds" stackId="1" stroke={C.teal} fill="url(#gPieds)" strokeWidth={2}/>
              </AreaChart>
            </ResponsiveContainer>
          </div>
        </Section>

        <Section className="col-span-12 lg:col-span-3" title="Types de blessures dominants"
                 sub="Catégorisation cross-zones" icon="incident" tone="orange">
          <div className="space-y-2">
            {topTypes.map((t,i) => {
              const colors = [C.red, C.orange, C.purple, C.blue, C.teal, C.yellow, C.green];
              const max = topTypes[0].count;
              return (
                <div key={t.type} className="text-[12px]">
                  <div className="flex items-center justify-between mb-1">
                    <span className="text-ink-700 font-medium">{t.type}</span>
                    <span className="font-mono tabular-nums font-bold text-ink-900">{t.count}</span>
                  </div>
                  <div className="h-1.5 bg-ink-100 rounded overflow-hidden">
                    <div className="h-full rounded" style={{ width:`${(t.count/max)*100}%`, background: colors[i] }}></div>
                  </div>
                </div>
              );
            })}
          </div>
        </Section>

        <Section className="col-span-12 lg:col-span-3" title="Indicateurs ergonomiques" sub="Jauges semi-circulaires" icon="risk" tone="teal">
          <div className="space-y-4">
            <HalfGauge value={73} max={100} label="Conformité ergonomie" valueLabel="73%" color={C.orange}/>
            <HalfGauge value={42} max={100} label="Postes à risque TMS" valueLabel="42" color={C.red}/>
          </div>
        </Section>
      </div>

      {/* Table — détail toutes les zones */}
      <Section title="Détail complet des zones corporelles" sub="Toutes vues · tri par colonne · export CSV"
               icon="user" tone="teal"
               action={<button onClick={()=>exportCSV('body_map_safex.csv', allZones.map(z=>({ id:z.id, zone:z.label, total:z.count, NM:z.sev.NM, FAC:z.sev.FAC, MTC:z.sev.MTC, RWC:z.sev.RWC, LTI:z.sev.LTI, last:z.lastInc })))} className="px-3 py-1.5 rounded-lg bg-teal-600 text-white text-[11.5px] font-semibold hover:bg-teal-700 transition flex items-center gap-1.5 no-print"><Icon name="download" size={12}/>Export</button>}>
        <DataTable
          data={allZones}
          pageSize={10}
          columns={[
            { key:'label', label:'Zone', render:r => <span className="font-medium text-ink-900">{r.label}</span> },
            { key:'count', label:'Total', align:'right', render:r => <span className="font-mono tabular-nums font-bold" style={{ color: zoneColor(r.count) }}>{r.count}</span> },
            { key:'NM',  accessor:r=>r.sev.NM,  label:'NM',  align:'right', render:r => <span className="font-mono tabular-nums">{r.sev.NM}</span> },
            { key:'FAC', accessor:r=>r.sev.FAC, label:'FAC', align:'right', render:r => <span className="font-mono tabular-nums">{r.sev.FAC}</span> },
            { key:'MTC', accessor:r=>r.sev.MTC, label:'MTC', align:'right', render:r => <span className="font-mono tabular-nums">{r.sev.MTC}</span> },
            { key:'RWC', accessor:r=>r.sev.RWC, label:'RWC', align:'right', render:r => <span className="font-mono tabular-nums">{r.sev.RWC}</span> },
            { key:'LTI', accessor:r=>r.sev.LTI, label:'LTI', align:'right', render:r => <span className="font-mono tabular-nums font-bold" style={{ color: r.sev.LTI>0?C.red:C.ink400 }}>{r.sev.LTI}</span> },
            { key:'types', accessor:r=>r.types.join(', '), label:'Types', render:r => <span className="text-[11px] text-ink-600">{r.types.join(' · ')}</span> },
            { key:'lastInc', label:'Dernier inc.', render:r => <span className="font-mono text-[11px] text-ink-500">{r.lastInc}</span> },
            { key:'action', label:'', align:'right', render:r => <button onClick={()=>setSelected(r)} className="text-teal-700 hover:text-teal-900 text-[11px] font-semibold no-print">Voir →</button> },
          ]}
        />
      </Section>
      </>)}
    </div>
  );
};

window.__SAFEX.PageBodyMap = PageBodyMap;

/* ===================================================================
   PAGE 9 — RAPPORT MENSUEL (6 onglets exportables)
   =================================================================== */
const ReportHeader = ({ title, refNo }) => (
  <div className="border-b-4 border-teal-600 pb-4 mb-5">
    <div className="flex items-start justify-between gap-4">
      <div className="flex items-center gap-3">
        <div className="leading-none flex-shrink-0 pr-3 border-r border-line">
          <div className="text-[24px] font-bold text-teal-700" style={{ letterSpacing:'-0.02em' }}>SafeX</div>
          <div className="text-[17px] font-bold -mt-0.5 tabular-nums" style={{ letterSpacing:'-0.01em' }}>
            <span style={{ color:'#22C55E' }}>3</span>
            <span style={{ color:'#2563EB' }}>6</span>
            <span style={{ color:'#EF4444' }}>0</span>
          </div>
        </div>

const ScheduleReportModal = ({ open, onClose, onSubmit, initial }) => {
  const [title, setTitle]     = useState(initial?.title || 'Envoi automatique : Rapport HSE Groupe');
  const [formats, setFormats] = useState(initial?.formats || ['PDF']);
  const [recipients, setRecipients] = useState(initial?.recipients || []);
  const [emailInput, setEmailInput] = useState('');
  const [subject, setSubject] = useState(initial?.subject || 'SafeX : Rapport HSE mensuel');
  const [message, setMessage] = useState(initial?.message || 'Bonjour,\n\nVeuillez trouver ci-joint le rapport HSE consolidé pour la période. Pour toute question, n\'hésitez pas à revenir vers la Direction HSE Groupe.\n\nBien cordialement,\nDirection HSE — SafeX');
  const [frequency, setFrequency] = useState(initial?.frequency || 'monthly');
  const [dayOfMonth, setDayOfMonth] = useState(initial?.dayOfMonth || 1);
  const [time, setTime] = useState(initial?.time || '08:00');

  if (!open) return null;

  const isValidEmail = (e) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);
  const addRecipient = () => {
    const e = emailInput.trim();
    if (e && isValidEmail(e) && !recipients.includes(e)) {
      setRecipients([...recipients, e]);
      setEmailInput('');
    }
  };
  const removeRecipient = (e) => setRecipients(recipients.filter(r => r !== e));
  const toggleFormat = (f) => setFormats(formats.includes(f) ? formats.filter(x=>x!==f) : [...formats, f]);

  const canSubmit = title.trim() && formats.length && recipients.length && subject.trim();
  const handleSubmit = () => {
    if (!canSubmit) return;
    onSubmit({ title, formats, recipients, subject, message, frequency, dayOfMonth, time,
               createdAt: new Date().toISOString().slice(0,16).replace('T',' '), id: 'SCH-' + Date.now().toString(36).toUpperCase() });
    onClose();
  };

  const FREQUENCIES = [
    { id:'once',      label:'Envoi unique' },
    { id:'daily',     label:'Chaque jour' },
    { id:'weekly',    label:'Chaque semaine' },
    { id:'monthly',   label:'Chaque mois' },
    { id:'quarterly', label:'Chaque trimestre' },
  ];

  return (
    <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 no-print" onClick={onClose}>
      <div className="absolute inset-0 bg-ink-900/55 backdrop-blur-sm anim-fadeup"></div>
      <div className="relative bg-white rounded-2xl shadow-2xl w-full max-w-[560px] max-h-[92vh] flex flex-col anim-fadeup overflow-hidden"
           style={{ boxShadow:'0 24px 60px -16px rgba(2,6,23,0.45)' }}
           onClick={(e)=>e.stopPropagation()}>
        {/* Header dark */}
        <div className="px-6 py-4 flex items-start justify-between flex-shrink-0"
             style={{ background:'linear-gradient(135deg, #0F172A 0%, #1E3A8A 100%)' }}>
          <div className="flex items-start gap-3">
            <div className="w-10 h-10 rounded-lg bg-white/15 flex items-center justify-center flex-shrink-0 backdrop-blur">
              <Icon name="calendar" size={20} className="text-white"/>
            </div>
            <div>
              <h3 className="text-[16px] font-bold text-white leading-tight">Planifier l'envoi du rapport</h3>
              <p className="text-[11.5px] text-white/70 mt-0.5">Tableau de bord HSE mensuel</p>
            </div>
          </div>
          <button onClick={onClose} className="p-1.5 hover:bg-white/15 rounded-lg text-white/80 hover:text-white transition">
            <Icon name="close" size={16}/>
          </button>
        </div>

        {/* Body scrollable */}
        <div className="flex-1 overflow-y-auto scrollbar-thin px-6 py-5 space-y-5">
          {/* Titre */}
          <div>
            <label className="text-[10.5px] uppercase tracking-widest text-ink-500 font-bold mb-1.5 block">Titre de la planification</label>
            <input type="text" value={title} onChange={e=>setTitle(e.target.value)}
                   className="w-full text-[13px] border border-line rounded-lg px-3 py-2.5 focus:border-teal-500 focus:ring-2 focus:ring-teal-100 outline-none"/>
          </div>

          {/* Format */}
          <div>
            <label className="text-[10.5px] uppercase tracking-widest text-ink-500 font-bold mb-1.5 block">Format(s) du rapport</label>
            <div className="grid grid-cols-2 gap-2.5">
              {[
                { id:'PDF',   title:'PDF',           sub:'Mise en page éditoriale', color:'#DC2626', icon:'report' },
                { id:'Excel', title:'Excel (XLSX)', sub:'Tableaux exploitables',   color:'#16A34A', icon:'layers' },
              ].map(f => {
                const active = formats.includes(f.id);
                return (
                  <button key={f.id} onClick={()=>toggleFormat(f.id)}
                          className={`text-left p-3 rounded-xl border-2 transition flex items-start gap-2.5 ${active?'border-teal-500 bg-teal-50/40 shadow-sm':'border-line hover:border-ink-300 hover:bg-ink-50'}`}>
                    <div className="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0" style={{ background:f.color+'18', border:`1px solid ${f.color}40` }}>
                      <Icon name={f.icon} size={15} style={{ color:f.color }}/>
                    </div>
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center justify-between">
                        <span className="text-[13px] font-semibold text-ink-900">{f.title}</span>
                        {active && <Icon name="check" size={13} className="text-teal-600" stroke={3}/>}
                      </div>
                      <div className="text-[10.5px] text-ink-500 mt-0.5">{f.sub}</div>
                    </div>
                  </button>
                );
              })}
            </div>
          </div>

          {/* Destinataires */}
          <div>
            <div className="flex items-center justify-between mb-1.5">
              <label className="text-[10.5px] uppercase tracking-widest text-ink-500 font-bold">Destinataires</label>
              <span className="text-[10px] font-mono text-ink-400">{recipients.length}/50</span>
            </div>
            <div className="flex items-center gap-2">
              <input type="email" value={emailInput} onChange={e=>setEmailInput(e.target.value)}
                     onKeyDown={e=>{ if (e.key==='Enter') { e.preventDefault(); addRecipient(); }}}
                     placeholder="exemple@safex.com"
                     className="flex-1 text-[13px] border border-line rounded-lg px-3 py-2.5 focus:border-teal-500 focus:ring-2 focus:ring-teal-100 outline-none"/>
              <button onClick={addRecipient}
                      disabled={!isValidEmail(emailInput.trim()) || recipients.includes(emailInput.trim())}
                      className="px-4 py-2.5 rounded-lg bg-ink-900 text-white text-[12.5px] font-semibold hover:bg-ink-800 disabled:opacity-40 disabled:cursor-not-allowed flex items-center gap-1.5">
                <Icon name="plus" size={13} stroke={2.5}/> Ajouter
              </button>
            </div>
            {recipients.length === 0 ? (
              <div className="text-[11.5px] text-ink-400 italic mt-1.5">Aucun destinataire. Ajoutez au moins une adresse e-mail.</div>
            ) : (
              <div className="flex flex-wrap gap-1.5 mt-2.5">
                {recipients.map(e => (
                  <span key={e} className="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md text-[11.5px] bg-teal-50 text-teal-700 border border-teal-200">
                    <Icon name="user" size={11}/> {e}
                    <button onClick={()=>removeRecipient(e)} className="hover:text-hred-600 ml-0.5"><Icon name="close" size={10} stroke={2.5}/></button>
                  </span>
                ))}
              </div>
            )}
          </div>

          {/* Sujet */}
          <div>
            <label className="text-[10.5px] uppercase tracking-widest text-ink-500 font-bold mb-1.5 block">Sujet de l'email</label>
            <input type="text" value={subject} onChange={e=>setSubject(e.target.value)}
                   className="w-full text-[13px] border border-line rounded-lg px-3 py-2.5 focus:border-teal-500 focus:ring-2 focus:ring-teal-100 outline-none"/>
          </div>

          {/* Message */}
          <div>
            <label className="text-[10.5px] uppercase tracking-widest text-ink-500 font-bold mb-1.5 block">Message d'accompagnement</label>
            <textarea value={message} onChange={e=>setMessage(e.target.value)} rows={5}
                      className="w-full text-[13px] border border-line rounded-lg px-3 py-2 focus:border-teal-500 focus:ring-2 focus:ring-teal-100 outline-none resize-y"/>
          </div>

          {/* Fréquence */}
          <div>
            <label className="text-[10.5px] uppercase tracking-widest text-ink-500 font-bold mb-1.5 block">Fréquence d'envoi</label>
            <div className="flex items-center gap-1.5 flex-wrap">
              {FREQUENCIES.map(f => (
                <button key={f.id} onClick={()=>setFrequency(f.id)}
                        className={`px-3 py-1.5 rounded-lg text-[11.5px] font-semibold transition ${frequency===f.id?'bg-ink-900 text-white shadow-sm':'border border-line text-ink-700 hover:bg-ink-50'}`}>
                  {f.label}
                </button>
              ))}
            </div>
          </div>

          {/* Jour + heure (conditionnel) */}
          {frequency !== 'once' && (
            <div className="grid grid-cols-2 gap-3">
              {(frequency === 'monthly' || frequency === 'quarterly') && (
                <div>
                  <label className="text-[10.5px] uppercase tracking-widest text-ink-500 font-bold mb-1.5 flex items-center gap-1.5">
                    <Icon name="calendar" size={11}/> Jour du mois
                  </label>
                  <input type="number" min={1} max={28} value={dayOfMonth} onChange={e=>setDayOfMonth(Math.min(28, Math.max(1, +e.target.value || 1)))}
                         className="w-full text-[13px] border border-line rounded-lg px-3 py-2.5 focus:border-teal-500 focus:ring-2 focus:ring-teal-100 outline-none"/>
                  <div className="text-[10px] text-ink-400 mt-1">Entre 1 et 28 (pour éviter les fins de mois variables).</div>
                </div>
              )}
              <div className={frequency === 'daily' || frequency === 'weekly' ? 'col-span-2' : ''}>
                <label className="text-[10.5px] uppercase tracking-widest text-ink-500 font-bold mb-1.5 flex items-center gap-1.5">
                  <Icon name="bolt" size={11}/> Heure d'envoi
                </label>
                <input type="time" value={time} onChange={e=>setTime(e.target.value)}
                       className="w-full text-[13px] border border-line rounded-lg px-3 py-2.5 focus:border-teal-500 focus:ring-2 focus:ring-teal-100 outline-none"/>
              </div>
            </div>
          )}
        </div>

        {/* Footer */}
        <div className="px-6 py-3.5 border-t border-line flex items-center justify-between gap-2 bg-ink-50/40 flex-shrink-0">
          <span className="text-[11px] text-ink-500 italic">{canSubmit ? '✓ Prêt à planifier' : 'Complétez les champs requis.'}</span>
          <div className="flex items-center gap-2">
            <button onClick={onClose} className="px-4 py-2 rounded-lg border border-line text-[12.5px] font-semibold hover:bg-ink-100 text-ink-700">Annuler</button>
            <button onClick={handleSubmit} disabled={!canSubmit}
                    className="px-4 py-2 rounded-lg bg-teal-600 text-white text-[12.5px] font-semibold hover:bg-teal-700 disabled:opacity-40 disabled:cursor-not-allowed flex items-center gap-1.5">
              <Icon name="calendar" size={13}/> Planifier l'envoi
            </button>
          </div>
        </div>
      </div>
    </div>
  );
};

        <button key={item.id} onClick={() => onChange(item.id)} title={item.label}
                className={`w-full flex justify-center py-3 transition nav-item-dark ${active===item.id?'active':'text-ink-400 hover:text-white hover:bg-ink-800/60'}`}>
          <Icon name={item.icon} size={18} className={active===item.id?'text-teal-300':item.iconColor}/>
        </button>
      ))}
    </nav>

    {!collapsed && (
      <div className="p-3 border-t border-ink-800 bg-ink-900/40">
        <div className="flex items-center gap-2 text-[11px]">
          <div className="w-8 h-8 rounded-full grad-teal text-white flex items-center justify-center font-bold flex-shrink-0">AN</div>
          <div className="min-w-0 flex-1">
            <div className="text-[11.5px] font-semibold text-white truncate">A. N'GUESSAN</div>
            <div className="text-[10px] text-ink-400">Dir. HSE Groupe</div>
          </div>
          <Icon name="dots" size={14} className="text-ink-500 hover:text-white cursor-pointer"/>
        </div>
      </div>
    )}
  </aside>
);

const FilterDrawer = ({ open, onClose, filters, onApply }) => {
  const [draft, setDraft] = useState(filters);
  useEffect(() => { setDraft(filters); }, [filters, open]);
  if (!open) return null;
  const toggleSet = (key, val) => setDraft(d => {
    const set = new Set(d[key]);
    if (set.has(val)) set.delete(val); else set.add(val);
    return { ...d, [key]: Array.from(set) };
  });
  return (
    <div className="fixed inset-0 z-50 no-print" onClick={onClose}>
      <div className="absolute inset-0 bg-ink-900/40"></div>
      <div className="absolute top-0 right-0 w-96 h-full bg-white filter-drawer anim-slidein flex flex-col" onClick={e=>e.stopPropagation()}>
        <div className="px-5 py-4 border-b border-line flex items-center justify-between">
          <div>
            <h3 className="text-[15px] font-semibold text-ink-900">Filtres avancés</h3>
            <p className="text-[11px] text-ink-500 mt-0.5">Affinez votre vue Analytics</p>
          </div>
          <button onClick={onClose} className="p-1.5 hover:bg-ink-100 rounded-lg"><Icon name="close" size={16}/></button>
        </div>
        <div className="flex-1 overflow-y-auto scrollbar-thin p-5 space-y-5">
          <div>
            <div className="text-[10.5px] uppercase tracking-wider text-ink-500 font-bold mb-2">Sites ({draft.sites.length || 'tous'})</div>
            <div className="space-y-1.5">
              {SITES.map(s => (
                <label key={s.id} className="flex items-center gap-2 text-[12px] cursor-pointer hover:bg-ink-50 px-2 py-1 rounded">
                  <input type="checkbox" checked={draft.sites.includes(s.id)} onChange={()=>toggleSet('sites', s.id)} className="rounded"/>
                  <span className="flex-1 text-ink-700">{s.name}</span>
                  <span className="text-[10px] text-ink-400">{s.country}</span>
                </label>
              ))}
            </div>
          </div>
          <div>
            <div className="text-[10.5px] uppercase tracking-wider text-ink-500 font-bold mb-2">Sévérité ({draft.severities.length || 'toutes'})</div>
            <div className="flex flex-wrap gap-2">
              {SEVERITY.map(s => (
                <button key={s.key} onClick={()=>toggleSet('severities', s.key)}
                        className={`px-2.5 py-1 rounded-md text-[11px] font-semibold border transition ${draft.severities.includes(s.key)?'text-white':'text-ink-700 bg-white'}`}
                        style={draft.severities.includes(s.key)?{ background:s.color, borderColor:s.color }:{ borderColor:C.ink300 }}>
                  {s.short}
                </button>
              ))}
            </div>
          </div>
          <div>
            <div className="text-[10.5px] uppercase tracking-wider text-ink-500 font-bold mb-2">Départements ({draft.depts.length || 'tous'})</div>
            <div className="grid grid-cols-2 gap-1.5">
              {DEPARTMENTS.map(d => (
                <label key={d} className="flex items-center gap-2 text-[11.5px] cursor-pointer hover:bg-ink-50 px-2 py-1 rounded">
                  <input type="checkbox" checked={draft.depts.includes(d)} onChange={()=>toggleSet('depts', d)} className="rounded"/>
                  <span className="text-ink-700 truncate">{d}</span>
                </label>
              ))}
            </div>
          </div>
          <div>
            <div className="text-[10.5px] uppercase tracking-wider text-ink-500 font-bold mb-2">Période personnalisée</div>
            <div className="grid grid-cols-2 gap-2">
              <div>
                <label className="text-[10px] text-ink-500">Du</label>
                <input type="date" value={draft.from} onChange={e=>setDraft(d=>({...d, from:e.target.value}))} className="w-full text-[12px] border border-line rounded px-2 py-1.5 mt-0.5"/>
              </div>
              <div>
                <label className="text-[10px] text-ink-500">Au</label>
                <input type="date" value={draft.to} onChange={e=>setDraft(d=>({...d, to:e.target.value}))} className="w-full text-[12px] border border-line rounded px-2 py-1.5 mt-0.5"/>
              </div>
            </div>
          </div>
        </div>
        <div className="px-5 py-4 border-t border-line flex items-center justify-between gap-2">
          <button onClick={()=>setDraft({ sites:[], severities:[], depts:[], from:'', to:'', period:'YTD' })} className="text-[11.5px] text-ink-500 hover:text-ink-900 font-semibold">Réinitialiser</button>
          <div className="flex items-center gap-2">
            <button onClick={onClose} className="px-3 py-1.5 rounded-lg border border-line text-[12px] font-semibold hover:bg-ink-50">Annuler</button>
            <button onClick={()=>{ onApply(draft); onClose(); }} className="px-4 py-1.5 rounded-lg bg-teal-600 text-white text-[12px] font-semibold hover:bg-teal-700">Appliquer</button>
          </div>
        </div>
      </div>
    </div>
  );
};

const Header = ({ pageLabel, period, onPeriodChange, onOpenFilters, activeFilters }) => {
  const filterCount = activeFilters.sites.length + activeFilters.severities.length + activeFilters.depts.length + (activeFilters.from?1:0) + (activeFilters.to?1:0);
  return (
    <header className="bg-white/80 backdrop-blur-md border-b border-line/60 px-6 py-3.5 sticky top-0 z-10 no-print">
      <div className="flex items-center justify-between gap-4 flex-wrap">
        <div className="min-w-0 flex-1">
          <div className="text-[10.5px] text-ink-400 flex items-center gap-1.5 uppercase tracking-wider font-medium">
            <span>Analytics</span><Icon name="chevron" size={9}/><span className="text-ink-600">{pageLabel}</span>
          </div>
          <div className="flex items-center gap-3 mt-1 flex-wrap">
            <h1 className="text-[20px] font-display font-bold text-ink-900 leading-tight tracking-tight">{pageLabel}</h1>
            <Badge tone="green" dot>Données à jour</Badge>
            <span className="text-[10.5px] text-ink-400 font-mono tabular-nums">MAJ 21/05/2026 09:54</span>
          </div>
        </div>
        <div className="flex items-center gap-2 flex-wrap">
          <div className="flex items-center gap-0 border border-line/70 rounded-xl overflow-hidden bg-ink-50/40">
            {['7j','30j','90j','YTD','12m','24m'].map(p => (
              <button key={p} onClick={()=>onPeriodChange(p)}
                      className={`px-3 py-1.5 text-[11px] font-semibold transition-all ${period===p?'bg-teal-600 text-white shadow-sm rounded-lg mx-0.5':'text-ink-600 hover:bg-white hover:text-ink-900'}`}>
                {p}
              </button>
            ))}
          </div>
          <button onClick={onOpenFilters} className="px-3 py-1.5 rounded-xl border border-line/70 text-ink-700 hover:bg-white hover:border-teal-200 flex items-center gap-1.5 text-[11.5px] font-semibold relative transition">
            <Icon name="filter" size={13}/> Filtres
            {filterCount > 0 && <span className="ml-1 inline-flex items-center justify-center min-w-[18px] h-[18px] px-1 rounded-full bg-teal-600 text-white text-[9.5px] font-bold tabular-nums">{filterCount}</span>}
          </button>
          <button onClick={()=>window.print()} className="px-3 py-1.5 rounded-xl border border-line/70 text-ink-700 hover:bg-white hover:border-teal-200 flex items-center gap-1.5 text-[11.5px] font-semibold transition" title="Exporter PDF">
            <Icon name="print" size={13}/> PDF
          </button>
          <button className="p-2 rounded-xl border border-line/70 text-ink-500 hover:bg-white hover:text-ink-700 transition" title="Actualiser"><Icon name="refresh" size={14}/></button>
          <button className="relative p-2 rounded-xl border border-line/70 text-ink-500 hover:bg-white hover:text-ink-700 transition" title="Notifications">
            <Icon name="bell" size={14}/>
            <span className="absolute top-1.5 right-1.5 w-2 h-2 rounded-full bg-hred-500 ring-2 ring-white"></span>
          </button>
        </div>
      </div>
    </header>
  );
};

/* ===================================================================
   APP
   =================================================================== */
const App = () => {
  const [active, setActive] = useState('executive');
  const [collapsed, setCollapsed] = useState(false);
  const [period, setPeriod] = useState('YTD');
  const [drawerOpen, setDrawerOpen] = useState(false);
  const [filters, setFilters] = useState({ sites:[], severities:[], depts:[], from:'', to:'', period:'YTD' });

  const pageLabel = (NAV.find(n=>n.id===active)||{}).label;
  const ctx = { filters: { ...filters, period } };

  let page;
  switch(active) {
    case 'executive': page = <PageExecutive/>; break;
    case 'incidents': page = <PageIncidents/>; break;
    case 'leading':   page = <PageLeading/>; break;
    case 'employee':  page = <PageEmployeeDeclarations/>; break;
    case 'bodymap':   page = <PageBodyMap/>; break;
    case 'risk':      page = <PageRisk/>; break;
    case 'audits':    page = <PageAudits/>; break;
    case 'sites':     page = <PageSites/>; break;
    case 'ppe':       page = <PagePPE/>; break;
    case 'trends':    page = <PageTrends/>; break;
    case 'monthly':   page = <PageMonthlyReport/>; break;
    default:          page = <PageExecutive/>;
  }

  return (
    <FilterCtx.Provider value={ctx}>
      <div className="flex">
        <SidebarDark active={active} onChange={setActive} collapsed={collapsed} onToggle={()=>setCollapsed(c=>!c)}/>
        <main className="flex-1 min-w-0 bg-bg">
          {/* Print-only header for PDF exports */}
          <div className="print-header px-6">
            <div>
              <div className="text-[18px] font-bold text-ink-900" style={{fontFamily:'Inter,sans-serif'}}>
                SafeX<span className="tabular-nums"><span style={{color:'#22C55E'}}>3</span><span style={{color:'#2563EB'}}>6</span><span style={{color:'#EF4444'}}>0</span></span>
                <span className="text-[13px] font-medium text-ink-500 ml-2">Analytics Platform</span>
              </div>
              <div className="text-[11px] text-ink-500 mt-1">{pageLabel} — Rapport généré le {new Date().toLocaleDateString('fr-FR', {day:'2-digit',month:'long',year:'numeric'})}</div>
            </div>
            <div className="text-right text-[10px] text-ink-400">
              <div>© {new Date().getFullYear()} Data Universe</div>
              <div className="font-mono">datauniverse.bf</div>
            </div>
          </div>
          <Header pageLabel={pageLabel} period={period} onPeriodChange={setPeriod}
                  onOpenFilters={()=>setDrawerOpen(true)} activeFilters={filters}/>
          <div className="p-6">{page}</div>
          <footer className="px-6 py-5 text-center text-[10.5px] text-ink-400 border-t border-line/60 bg-white/60 backdrop-blur-sm no-print">
            <span className="font-semibold text-ink-700">SafeX<span className="tabular-nums"><span style={{ color:'#22C55E' }}>3</span><span style={{ color:'#2563EB' }}>6</span><span style={{ color:'#EF4444' }}>0</span></span></span>
            <span className="mx-2 text-ink-300">|</span>Analytics Platform v1.0
            <span className="mx-2 text-ink-300">|</span>Données fictives de démonstration
            <span className="mx-2 text-ink-300">|</span>© {new Date().getFullYear()} Data Universe
          </footer>
        </main>
        <FilterDrawer open={drawerOpen} onClose={()=>setDrawerOpen(false)} filters={filters} onApply={setFilters}/>
      </div>
    </FilterCtx.Provider>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
