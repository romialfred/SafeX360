spring:
  application:
    name: GatewayMS
  cloud:
    loadbalancer:
      retry:
        enabled: true
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin RETAIN_UNIQUE
        - DedupeResponseHeader=Access-Control-Allow-Origin RETAIN_FIRST
        - DedupeResponseHeader=Access-Control-Allow-Credentials RETAIN_FIRST
      routes:
        - id: hrms
          uri: ${MINE_XPERT_URL}
          # uri: lb://hrms
          predicates:
            - Path=/hrms/**
          filters:
            - TokenFilter
        - id: Health-Safety
          uri: ${SAFEX_URL}
          # uri: lb://Health-Safety
          predicates:
            - Path=/hns/**
          filters:
            - TokenFilter
      httpclient:
        connect-timeout: 10000
        response-timeout: 60s
server:
  port: 9000

# Liste exacte, centralisée, utilisée à la fois par CORS et la protection CSRF.
safex:
  allowed-origins: ${SAFEX_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:5174,http://localhost:5474,http://localhost:5475,https://localhost,capacitor://localhost,https://health-safety-eight.vercel.app,https://safex360.vercel.app,http://host.docker.internal:3000,https://safex360.data-univers.com,http://app1.localtest.me:3000,http://app2.localtest.me:5173,https://mine-xpert.data-univers.com,https://dev.safex360.data-univers.com}
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL}
    fetch-registry: true
    register-with-eureka: true
