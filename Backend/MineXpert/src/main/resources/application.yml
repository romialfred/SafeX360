spring:
  application:
    name: hrms

  datasource:
    # LOT 42 P0 security : suppression des credentials Aiven en clair
    # qui étaient laissés en commentaire (bloqués par GitHub Push Protection).
    # Toute config sensible passe par les env vars Render.
    username: ${DB_USERNAME}
    url: ${DB_URL}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  web:
    resources:
      static-locations: file:M:/hrmsDocs/

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  mail:
    # Uncomment to use environment-based config
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    # username: no-replay@data-univers.com
    # password: Connex@ted001$
    host: mail.data-univers.com
    port: 465
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          socketFactory:
            port: 465
            class: javax.net.ssl.SSLSocketFactory
            fallback: false
          ssl:
            enable: true

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      # LOT 42 hotfix : probes liveness/readiness pour booter rapide sur Render
      probes:
        enabled: true
      show-details: never
  health:
    # Désactive le check mail (SMTP) qui prend 11s+ et timeout Render
    mail:
      enabled: false

app:
  mail:
    # from: Data Universe <${spring.mail.username}>
    from: ${MAIL_FROM}

# Server settings
# port: 8080
server:
  servlet:
    context-path: /hrms

# Eureka settings
eureka:
  client:
    register-with-eureka: true
    service-url:
      defaultZone: ${EUREKA_SERVER_URL}

# Login URL
# LOGIN_URL: http://locahost:3000
LOGIN_URL: ${LOGIN_URL}

# === Custom Messages ===

# Leave
LEAVE_SETTING_ALREADY_EXISTS: Leave setting already exists.
LEAVE_SETTINGS_NOT_FOUND: Leave Setting does not exist.
LEAVE_ALREADY_EXISTS: Leave already exists.

# Company
COMPANY_ALREADY_EXISTS: Company already exists.
COMPANY_NOT_FOUND: Company does not exist.

# Department
DEPARTMENT_ALREADY_EXISTS: Department already exists.
DEPARTMENT_NOT_FOUND: Department does not exist.

# Roster
ROSTER_NOT_FOUND: Roster does not exist.
ROSTER_ALREADY_EXISTS: Roster already exists.

# Position Category
POSITION_CATEGORY_NOT_FOUND: Position Category does not exist.
POSITION_CATEGORY_ALREADY_EXISTS: Position Category already exists.

# Position
POSITION_ALREADY_EXISTS: Position already exists.
POSITION_NOT_FOUND: Position does not exist.

# Employee
EMPLOYEE_ALREADY_EXISTS: Employee already exists.
EMPLOYEE_NOT_FOUND: Employee does not exist.
UNIQUE_NUMBER_EXISTS: Unique Number already exists.
LOGIN_ALREADY_EXISTS: Login already exists.

# Leave Balance
DUPLICATE_ENTRY: Record Already Present.
NOT_ENOUGH_LEAVE: Not Enough Leave Balance.
RECORD_NOT_FOUND: No Records Found.

# Contract
CONTRACT_NOT_FOUND: Contract does not exist.

# Account
ACCOUNT_NOT_FOUND: Account does not exist.

# Salary Advance
SALARY_ADVANCE_NOT_FOUND: Salary Advance does not exist.
SALARY_ADVANCE_ALREADY_EXISTS: Salary Advance already exists, or pay previous salary advance.

# TimeSheet - Team
TEAM_NOT_FOUND: Team does not exist.

# TimeSheet - Member
TEAM_MEMBER_ALREADY_EXISTS: Member already exists.
TEAM_MEMBER_NOT_FOUND: Member does not exist.
TEAM_MEMBER_ACTIVE_IN_ANOTHER_TEAM: Member is already active in another team.

# TimeSheet - Manager
TEAM_MANAGER_ALREADY_EXISTS: Manager already exists.
TEAM_MANAGER_NOT_FOUND: Manager does not exist.
ROLE_ACTIVE_IN_TEAM: Manager having same role is already active in team.

# Timesheet
TIMESHEET_NOT_FOUND: Timesheet does not exist.
TIMESHEET_ALREADY_CREATED: Timesheet already created for this period.

# Member Entry
MEMBER_ENTRY_ALREADY_EXISTS: Member Entry already exists.

# Day Entry
DAY_ENTRY_ALREADY_EXISTS: Day Entry already exists.

# Work Category
WORK_CATEGORY_ALREADY_EXISTS: Work Category already exists.
WORK_CATEGORY_NOT_FOUND: Work Category does not exist.

# Work Hour Code
WORK_HOUR_CODE_NOT_FOUND: Work Hour Code does not exist.
CANNOT_UPDATE_WORK_HOUR_CODE: Cannot update Work Hour Code.
WORK_HOUR_CODE_ALREADY_EXISTS: Work Hour Code already exists.
WORK_HOUR_CODE_PAYROLL_CODE_ALREADY_EXISTS: Payroll Code already exists.
WORK_HOUR_CODE_NAME_ALREADY_EXISTS: Work Hour Code Name already exists.

# Signature
SIGNATURE_NOT_FOUND: Signature does not exist.
SIGNATURE_ALREADY_EXISTS: Signature already exists.

# Payroll Schedule
PAYROLL_SCHEDULE_ALREADY_EXISTS: Payroll Schedule already exists.
PAYROLL_SCHEDULE_OVERLAP: Payroll Schedule overlaps with another schedule.
PAYROLL_SCHEDULE_NOT_FOUND: Payroll Schedule does not exist.

# Flags
FLAG_ALREADY_EXISTS: Flag already exists.
FLAG_NOT_FOUND: Flag does not exist.
FLAG_ALREADY_ACTIVE: Flag already active.
FLAG_ALREADY_INACTIVE: Flag already inactive.

TEAM_MEMBER_CREATION_NOT_ALLOWED_MID_WEEK: Team member addition is not allowed mid-week.
TEAM_MEMBER_ACTIVATION_NOT_ALLOWED_MID_WEEK: Team member activation is not allowed mid-week.
