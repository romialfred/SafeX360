spring:
  application:
    name: Health-Safety

  # ─── Spring Security : volontairement NON active en Phase 1 ───────────────
  # Les annotations @PreAuthorize presentes sur les controllers Dosimetrie
  # (DoseRecord, Threshold, ExposedWorker, MedicalSurveillance, ExposureAlert)
  # referencent les permissions de DosimetryRBACConfig. Elles sont declarees
  # mais inertes tant que @EnableMethodSecurity n'est pas active au demarrage,
  # afin de ne PAS casser les autres endpoints du monolithe HSE qui ne sont
  # pas encore couverts par la matrice RBAC complete.
  #
  # Enable in Phase 2 once full RBAC tested (cf. roadmap Dosimetrie P2) :
  #   security:
  #     enabled: true
  # + ajout d'une SecurityConfig avec @EnableMethodSecurity(prePostEnabled=true)
  # + JwtAuthenticationFilter qui mappe X-Permissions header -> GrantedAuthority
  # En Phase 1, la trace de conformite reglementaire (AIEA GSR Part 3 §3.106 /
  # RGPD art. 30) est portee par DosimetryAuditLog cote service.
  # ──────────────────────────────────────────────────────────────────────────

  # LOT 40 P0 fix : suppression des credentials Aiven commentés en clair
  # (clés API exposées même en commentaires = leak si repo public).
  # Toute config sensible passe désormais exclusivement par .env.
  datasource:
    username: ${DB_USERNAME}
    url: ${DB_URL}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL:8}
      minimum-idle: ${HIKARI_MIN_IDLE:3}
      idle-timeout: 300000
      max-lifetime: 600000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  # LOT 40 P0 fix : credentials mail externalisés vers .env
  # (était hardcodé en clair = security leak).
  mail:
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    host: ${MAIL_HOST:mail.data-univers.com}
    port: ${MAIL_PORT:465}
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          socketFactory:
            port: 465
            class: javax.net.ssl.SSLSocketFactory
            fallback: false
          ssl:
            enable: true

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      # LOT 42 hotfix : probes liveness/readiness pour booter rapide sur Render
      probes:
        enabled: true
      show-details: never
  health:
    # Désactive le check mail SMTP qui prend 11s+ et timeout Render
    mail:
      enabled: false

server:
  port: 8081
  servlet:
    context-path: /hns

eureka:
  client:
    register-with-eureka: true
    service-url:
      defaultZone: ${EUREKA_SERVER_URL}

