# Default sender address for outgoing emails
app:
  mail:
    from: ${MAIL_FROM:no-replay@data-univers.com}

# ─── Blast Management (LOT 49 / Phase 3) ─────────────────────────────────
# Override SMTP credentials per-environment via env vars. When SMTP_HOST is
# empty or points to example.com, BlastEmailService logs a WARN and treats
# jobs as SENT without actually opening a connection — keeps CI / dev local
# green without requiring a real mail relay.

# ─── Emergency email notifications (SOS + General Alert) ────────────────
# Comma-separated list of HSE coordinator emails.
# Leave empty to disable email notifications (graceful degradation).
emergency:
  email:
    recipients: ${EMERGENCY_EMAIL_RECIPIENTS:}

blast:
  email:
    from: ${BLAST_EMAIL_FROM:hse-noreply@safex360.com}
  site:
    label: ${BLAST_SITE_LABEL:Mine — Site principal}

# Optionnel : la chaine SMTP utilisee par BlastEmailService est partagee avec
# le reste du module HSE (spring.mail.* defini plus haut). Les variables
# ci-dessous sont une surcharge explicite par environnement, conformes au
# prompt P3.
# spring.mail.host: ${SMTP_HOST:smtp.example.com}
# spring.mail.port: ${SMTP_PORT:587}
# spring.mail.username: ${SMTP_USER:}
# spring.mail.password: ${SMTP_PASSWORD:}
# spring.mail.properties.mail.smtp.starttls.enable: ${SMTP_STARTTLS:true}

scheduler:
  poll-ms: 60000
  batch-size: 50
  retry-backoff-seconds: 300
hrms:
  url: ${MINE_XPERT_URL}

# LOT 42 hotfix : la config management a été fusionnée dans le bloc plus haut
# pour éviter "found duplicate key management" qui crashait Spring au démarrage.

# LOT 52 — Audits ISO 19011 (remediation GATE CODE-02)
AUDIT_NOT_FOUND: L audit indique n existe pas.
PROGRAM_NOT_FOUND: Le programme d audit n existe pas.
OBSERVATION_NOT_FOUND: Le constat indique n existe pas.
CLASSIFICATION_INVALID: Classification de constat invalide (NC_MAJEURE, NC_MINEURE, OBSERVATION, OPPORTUNITE).
CLAUSE_REQUIRED_FOR_NC: La clause du referentiel est obligatoire pour une non-conformite.
EVIDENCE_REQUIRED_FOR_NC: Au moins une preuve est obligatoire pour une non-conformite.
ONLY_NC_CAN_BE_ESCALATED: Seul un constat classe non-conformite peut etre escalade.
REFERENTIALS_REQUIRED: Au moins un referentiel est requis pour initialiser la checklist.
REFERENTIAL_INVALID: Referentiel invalide (ISO_45001, ISO_14001, ISO_9001, MINIER).
CHECKLIST_ITEM_NOT_FOUND: La question de checklist n existe pas.
CHECKLIST_RESULT_INVALID: Resultat de checklist invalide.
COMMENT_REQUIRED_FOR_NON_CONFORME: Un commentaire factuel est obligatoire pour une question non conforme.
RECOMMENDATION_NOT_FOUND: La recommandation indiquee n existe pas.
EFFECTIVENESS_REQUIRES_COMPLETED_RECOMMENDATION: La verification d efficacite ne se planifie que sur une recommandation terminee.
EFFECTIVENESS_CHECK_NOT_FOUND: La verification d efficacite n existe pas.
EFFECTIVENESS_ALREADY_CONCLUDED: Cette verification a deja recu un verdict.
VERDICT_INVALID: Verdict invalide (EFFICACE, PARTIELLEMENT_EFFICACE, INEFFICACE).
DUE_DATE_REQUIRED: L echeance de verification est obligatoire.

# LOT 53 — verrouillage de cloture ISO 19011 (6.6) : conditions de fin d audit
CLOSURE_REQUIRES_APPROVED_REPORT: Cloture impossible, le rapport d audit doit etre redige et APPROUVE (ISO 19011 6.5).
CLOSURE_REQUIRES_COMPLETED_CHECKLIST: Cloture impossible, des questions de checklist restent A EVALUER (ISO 19011 6.4.7).
CLOSURE_REQUIRES_CLASSIFIED_FINDINGS: Cloture impossible, tous les constats doivent etre classes (NC majeure/mineure, observation ou opportunite — ISO 19011 6.4.8).
CLOSURE_REQUIRES_ESCALATED_NC: Cloture impossible, toute non-conformite doit etre escaladee vers les Constats centraux pour suivi des actions (ISO 19011 6.7).
CLOSURE_REQUIRES_OPENING_AND_CLOSING_MEETINGS: Cloture impossible, les reunions d ouverture ET de cloture doivent etre enregistrees (ISO 19011 6.4.2 / 6.4.9).

# Module Gestion des Erreurs (Error Management) — messages d erreur
COMPANY_ID_REQUIRED: La mine de rattachement est obligatoire.
ERROR_EVENT_DETAILS_REQUIRED: Les informations de l evenement sont obligatoires.
ERROR_EVENT_NOT_FOUND: L evenement erreur indique n existe pas.
ERROR_EVENT_STATUS_REQUIRED: Le statut cible est obligatoire.
ERROR_EVENT_STATUS_UNCHANGED: Le statut cible est identique au statut actuel.
ERROR_EVENT_STATUS_REGRESSION_FORBIDDEN: Transition interdite, le workflow ne peut pas revenir en arriere (sauf reouverture justifiee).
CAUSAL_ANALYSIS_NOT_FOUND: L analyse causale indiquee n existe pas.
CAUSE_NOT_FOUND: La cause indiquee n existe pas.
